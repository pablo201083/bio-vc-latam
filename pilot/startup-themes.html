<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIO LATAM — Ecosistema de Innovación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260422p">
  <style>
    .topbar{display:flex;align-items:center;gap:28px;padding:14px 22px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:18px}
    .topbar-brand{flex:1;min-width:0}
    .topbar-eyebrow{margin:0 0 4px;font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--accent);display:block;font-weight:600;font-family:var(--sans)}
    .topbar-title{margin:0 0 4px;font-size:1.9rem;line-height:1;letter-spacing:-.03em;font-family:Georgia,"Times New Roman",serif}
    .topbar-sub{margin:0;font-size:.8rem;color:var(--muted);font-family:var(--sans)}
    .topbar-stats{display:flex;gap:24px;align-items:center;padding:0 4px;border-left:1px solid var(--line);border-right:1px solid var(--line);padding:0 28px}
    .topbar-stat{display:flex;flex-direction:column;align-items:center;text-align:center;min-width:52px}
    .topbar-stat strong{font-size:1.5rem;font-weight:700;line-height:1;display:block}
    .topbar-stat span{font-size:.61rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:3px;display:block}
    .topbar-link{font-size:.8rem;color:var(--muted);text-decoration:none;white-space:nowrap;border:1px solid var(--line);border-radius:7px;padding:6px 12px;transition:color .12s,border-color .12s;background:rgba(255,255,255,.7)}
    .topbar-link:hover{color:var(--ink);border-color:rgba(150,140,130,.5)}

    .themes-layout{display:grid;grid-template-columns:340px minmax(0,1fr);gap:20px}
    .themes-sidebar,.themes-stage{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .themes-sidebar{padding:0;overflow:hidden;display:flex;flex-direction:column;max-height:870px}
    .sidebar-head{padding:14px 16px 11px;border-bottom:2px solid var(--line);flex:0 0 auto}
    .sidebar-head .item-title{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--ink);margin-bottom:0;font-family:var(--sans)}
    .sidebar-stats{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
    .s-chip{border-radius:4px;padding:2px 7px;font-size:.67rem;font-weight:600;letter-spacing:.04em;font-family:var(--sans)}
    .s-chip-teal{background:rgba(11,143,135,.11);color:var(--accent)}
    .s-chip-muted{background:rgba(0,0,0,.06);color:var(--muted)}

    .cluster-list{flex:1 1 auto;overflow-y:auto;padding:8px 10px;display:grid;gap:4px}
    .cr{padding:9px 11px;border:1px solid rgba(217,206,190,.65);border-left:3px solid var(--cr-color,rgba(217,206,190,.65));border-radius:9px;background:rgba(255,255,255,.78);cursor:pointer;transition:background .13s,box-shadow .13s,opacity .13s}
    .cr:hover{background:rgba(255,255,255,.98);box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .cr.active{background:rgba(255,255,255,.98);box-shadow:0 3px 14px rgba(0,0,0,.1)}
    .cr.dimmed{opacity:.25}
    .cr-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:7px;align-items:center;margin-bottom:4px}
    .cr-dot{display:none}
    .cr-name{font-size:.875rem;font-weight:700;color:var(--ink);line-height:1.2;letter-spacing:-.01em}
    .cr-count{font-size:.69rem;color:var(--muted);background:rgba(0,0,0,.06);border-radius:5px;padding:1px 6px;white-space:nowrap;font-weight:600;font-variant-numeric:tabular-nums}
    .cr-desc{font-size:.71rem;color:var(--muted);line-height:1.38;margin-bottom:5px;font-style:italic}
    .cr-tags{display:flex;flex-wrap:wrap;gap:3px}
    .ct{border-radius:5px;border:1px solid rgba(217,206,190,.84);background:rgba(255,255,255,.88);color:var(--muted);font-size:.66rem;padding:2px 6px;line-height:1.3}
    .ct-tech{background:rgba(11,143,135,.07);color:var(--accent);border-color:rgba(11,143,135,.3)}
    .ct-ind{background:rgba(154,52,18,.06);color:#7a2e12;border-color:rgba(154,52,18,.22)}

    .detail-pane{flex:0 0 auto;border-bottom:1px solid var(--line);padding:12px 15px;font-size:.81rem;color:var(--muted);line-height:1.5;max-height:260px;overflow-y:auto;background:rgba(248,245,239,.4)}
    .dp-hint{font-size:.75rem;color:var(--muted);opacity:.55;display:block}
    .dp-title{font-weight:700;color:var(--ink);font-size:.9rem;margin-bottom:6px;line-height:1.3}
    .dp-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
    .dp-chip{border-radius:5px;border:1px solid var(--line);background:#fff;padding:2px 8px;font-size:.7rem;color:var(--muted)}
    .dp-chip-tech{background:rgba(11,143,135,.09);color:var(--accent);border-color:rgba(11,143,135,.3)}
    .dp-chip-ind{background:rgba(154,52,18,.07);color:#7a2e12;border-color:rgba(154,52,18,.22)}
    .dp-link{color:var(--accent);text-decoration:none;font-size:.77rem}
    .dp-link:hover{text-decoration:underline}

    .themes-stage{padding:14px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:visible}
    .tb-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
    .tb-between{display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:space-between}
    .vt-group{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:rgba(255,255,255,.85)}
    .vt-btn{border:0;border-right:1px solid var(--line);background:transparent;color:var(--muted);padding:5px 13px;font:inherit;font-size:.81rem;font-weight:500;cursor:pointer;transition:background .12s,color .12s;letter-spacing:.01em}
    .vt-btn:last-child{border-right:0}
    .vt-btn.active{background:var(--accent);color:#fff;font-weight:700}
    .vt-btn:hover:not(.active){background:rgba(0,0,0,.04);color:var(--ink)}
    .fc-row{display:flex;flex-wrap:wrap;gap:4px}
    .fc{border-radius:7px;border:1.5px solid rgba(210,202,190,.75);background:#fff;color:var(--muted);font:inherit;font-size:.74rem;padding:4px 11px;cursor:pointer;transition:background .11s,color .11s,border-color .11s,box-shadow .11s;line-height:1.4;white-space:nowrap;user-select:none}
    .fc:hover{border-color:var(--accent);color:var(--ink);background:rgba(23,139,135,.04);box-shadow:0 1px 4px rgba(23,139,135,.1)}
    /* Seleccionado: fondo sólido + blanco + × al final */
    .fc.active-tech{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 6px rgba(23,139,135,.22)}
    .fc.active-tech::after{content:" ×";opacity:.75;font-size:.88em;font-weight:400}
    .fc.active-ind{background:#7a2e12;color:#fff;border-color:#7a2e12;box-shadow:0 1px 6px rgba(122,46,18,.22)}
    .fc.active-ind::after{content:" ×";opacity:.75;font-size:.88em;font-weight:400}
    .fc.active-country{background:#1e3a8a;color:#fff;border-color:#1e3a8a;box-shadow:0 1px 6px rgba(30,58,138,.22)}
    .fc.active-country::after{content:" ×";opacity:.75;font-size:.88em;font-weight:400}
    .chip-lbl{font-size:.69rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;align-self:center}
    .clear-fc{font-size:.72rem;padding:3px 9px;color:var(--muted);border-color:rgba(200,192,180,.5);background:transparent}
    .clear-fc:hover{color:var(--ink);border-color:var(--muted);background:rgba(0,0,0,.04)}
    /* Sección de filtro con label + clear inline */
    .fp-sec-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .fp-sec-lbl{font-size:.67rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;flex:0 0 auto}
    .fp-sec-clr{font-size:.67rem;color:var(--accent);background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;display:none}
    .fp-sec-clr.vis{display:inline}
    .fp-sec-clr:hover{text-decoration:underline}

    .canvas-wrap{border:1px solid var(--line);border-radius:16px;background:radial-gradient(circle at 20% 20%,rgba(11,143,135,.04),transparent 18rem),radial-gradient(circle at 80% 15%,rgba(154,52,18,.04),transparent 20rem),#f7f4ee;overflow:hidden;position:relative;flex:1 1 auto;min-height:640px}
    #themes-svg{display:block;width:100%;height:100%}
    .z-ctrl{position:absolute;right:12px;bottom:12px;display:grid;gap:5px;z-index:2}
    .z-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.95);box-shadow:var(--shadow);font:inherit;font-size:.95rem;cursor:pointer}
    .z-btn:hover{border-color:var(--accent)}

    .hov{position:absolute;min-width:260px;max-width:320px;padding:12px 14px;border:1px solid rgba(200,190,178,.8);border-radius:12px;background:rgba(255,253,249,.98);box-shadow:0 8px 28px rgba(44,36,22,.14),0 2px 6px rgba(44,36,22,.07);pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity 100ms ease,transform 100ms ease;z-index:10}
    .hov.vis{opacity:1;transform:translateY(0)}
    .hov-title{font-size:.93rem;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.3}
    .hov-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
    .hov-chip{border-radius:5px;border:1px solid var(--line);background:rgba(255,255,255,.94);padding:2px 7px;font-size:.7rem;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
    .hov-dot{width:7px;height:7px;border-radius:999px;flex:0 0 auto}
    .hov-body{font-size:.81rem;color:var(--ink);line-height:1.42;margin-bottom:7px}
    .hov-small{font-size:.71rem;color:var(--muted)}

    .srch-wrap{position:relative}
    .srch-res{position:absolute;z-index:6;top:calc(100% + 4px);left:0;right:0;display:none;max-height:200px;overflow:auto;border:1px solid var(--line);border-radius:11px;background:rgba(255,252,246,.98);box-shadow:var(--shadow);padding:3px}
    .srch-res.open{display:grid;gap:2px}
    .srch-item{border:0;border-radius:8px;background:transparent;color:var(--ink);cursor:pointer;display:grid;gap:1px;padding:5px 8px;text-align:left;font:inherit;font-size:.83rem}
    .srch-item:hover{background:rgba(11,143,135,.09)}
    .srch-item small{color:var(--muted);font-size:.71rem}
    .lbl-btn{border:1px solid var(--line);background:rgba(255,255,255,.85);color:var(--muted);border-radius:8px;padding:5px 11px;font:inherit;font-size:.81rem;font-weight:500;cursor:pointer;transition:background .12s,border-color .12s,color .12s}
    .lbl-btn:hover{background:#fff;color:var(--ink)}
    .lbl-btn.on{background:rgba(11,143,135,.1);border-color:var(--accent);color:var(--accent);font-weight:600}
    .conf-leg{display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--muted);margin-left:auto;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
    .cs{width:9px;height:9px;border-radius:999px;border:1px solid rgba(0,0,0,.12)}

    /* ── Breadcrumbs — overlay sobre el canvas, no afecta su tamaño ── */
    .breadcrumbs{display:none;flex-wrap:wrap;gap:5px;align-items:center;min-height:26px;
      position:absolute;top:58px;left:14px;right:14px;z-index:7;
      background:rgba(248,245,239,.88);backdrop-filter:blur(4px);
      border-radius:10px;padding:4px 8px}
    .bc-pill{border:1px solid rgba(23,139,135,.35);background:rgba(23,139,135,.08);color:var(--accent);border-radius:999px;padding:3px 10px;font:inherit;font-size:.73rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .12s}
    .bc-pill:hover{background:rgba(23,139,135,.16)}
    .bc-pill .bc-x{font-size:.8rem;line-height:1;opacity:.7}
    .bc-all{border-color:rgba(154,52,18,.3);background:rgba(154,52,18,.07);color:#7a2e12}
    .bc-all:hover{background:rgba(154,52,18,.15)}
    .bc-lbl{font-size:.67rem;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}

    /* ── Filter panel — overlay flotante, no entra en el flex-flow ── */
    .filter-panel{display:none;border:1px solid var(--line);border-radius:14px;background:rgba(255,252,247,.98);padding:10px 14px;gap:7px;flex-direction:column}
    .filter-panel.open{
      display:flex;
      position:absolute;
      top:54px;left:0;right:0;
      z-index:9;
      box-shadow:0 6px 24px rgba(44,36,22,.13);
    }
    .fp-row{display:flex;flex-direction:column;gap:4px}
    .fp-chips{display:flex;flex-wrap:nowrap;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
    .fp-chips::-webkit-scrollbar{display:none}
    .filter-active{background:rgba(11,143,135,.1)!important;border-color:var(--accent)!important;color:var(--ink)!important}

    /* ── Cluster halo labels (floating on SVG) ── */
    .halo-lbl{font-weight:700;pointer-events:none;font-family:inherit}

    @media(max-width:1100px){.themes-layout{grid-template-columns:1fr}.topbar{flex-wrap:wrap;gap:16px}}
    @media(max-width:680px){.topbar-stats{display:none}}
  </style>
</head>

<script>
(function(){
"use strict";

const D = window.STARTUP_THEMES_DATA;
if(!D||!D.startups||!D.startups.length){
  document.getElementById("detail-pane").textContent="Sin datos. Ejecutá: python -m src.clustering";
  return;
}

// ── Bio-theme descriptions (curated, editorial) ───────────────────────────────
const THEME_DESC = D.bio_theme_descriptions || {};

// ── Editorial category palette — 7 bottom-up categories ─────────────────────
const THEME_PAL={
  "Therapeutics":                  "#7033BC",
  "Diagnostics & Health Access":   "#1A6DB5",
  "Food Systems & Alt Proteins":   "#C25A2A",
  "Bioinputs & Crop Resilience":   "#2A7A42",
  "Nature & Ecosystem Tech":       "#127A6E",
  "Farm Intelligence":             "#2E4E8C",
  "Biomaterials & Circular Economy":"#8B6D14",
};
const THEME_ADJ="#8a7d70"; // eco-adjacent / unclassified

// Ordered list for sidebar + theme-grid view
const THEME_ORDER=[
  "Therapeutics","Diagnostics & Health Access","Food Systems & Alt Proteins",
  "Bioinputs & Crop Resilience","Nature & Ecosystem Tech",
  "Farm Intelligence","Biomaterials & Circular Economy"
];

function themeCol(bio_theme){
  return THEME_PAL[bio_theme]||THEME_ADJ;
}
// Legacy alias (for graph edges that still use cluster_id)
function clCol(cid){ return THEME_ADJ; }

// ── Startup data prep ─────────────────────────────────────────────────────
const startups=D.startups;
const clusters=D.clusters||[];
const vTech=D.vocab_tech||{};
const vInd=D.vocab_industry||{};
const clMap=new Map(clusters.map(c=>[c.cluster_id,c]));

// ── Theme map (primary nav) — built from startup bio_theme field ──────────
const themeMap=new Map();
startups.forEach(s=>{
  const t=s.bio_theme||"Uncategorized";
  if(!themeMap.has(t)){
    themeMap.set(t,{
      name:t,color:themeCol(t),count:0,
      subClusters:new Map(), // label→count within theme
      countries:{},n_funded:0,n_featured:0,
    });
  }
  const tm=themeMap.get(t);
  tm.count++;
  if(s.cluster_label){
    const kw=s.cluster_keywords||"";
    tm.subClusters.set(s.cluster_label,(tm.subClusters.get(s.cluster_label)||0)+1);
  }
  (s.countries||[]).forEach(c=>tm.countries[c]=(tm.countries[c]||0)+1);
  if(s.n_rounds>0)tm.n_funded++;
  if(s.valuation_tier!=null&&s.valuation_tier>=2)tm.n_featured++;
});

// Active theme filter (replaces activeCluster for primary navigation)
let activeTheme=null;

// Stats header
document.getElementById("meta-model").textContent=D.model;
document.getElementById("meta-total").textContent=D.stats.total_startups+" startups";
document.getElementById("meta-clusters").textContent=THEME_ORDER.filter(t=>themeMap.has(t)).length+" bio themes · "+D.stats.featured_count+" featured";
document.getElementById("s-total").textContent=D.stats.total_startups+" startups";
document.getElementById("s-featured").textContent=D.stats.featured_count+" destacadas";
document.getElementById("s-funded").textContent=D.stats.funded_count+" con inversión";

// ── Node objects ──────────────────────────────────────────────────────────
const W0=900,H0=600;
let W=W0,H=H0;
const nodes=startups.map(s=>({
  d:s,
  mx:0,my:0,    // UMAP map position
  kx:0,ky:0,   // Cluster arrangement position
  gxs:0,gys:0, // Graph/network position (screen coords)
  cx:0,cy:0,   // current rendered position
  circEl:null,ringEl:null,lblEl:null
}));
const nodeMap=new Map(nodes.map(n=>[n.d.id,n]));

// ── UMAP map positions ─────────────────────────────────────────────────────
function computeMapPos(){
  const pad=38;
  // Use only core (non-outlier) nodes to define the canvas range —
  // prevents 2-3 extreme outliers from compressing the main cluster region.
  // Outlier nodes that fall outside this range get clamped naturally by relaxMapPos.
  const core=startups.filter(s=>!s.is_outlier);
  const xs=core.map(s=>s.x), ys=core.map(s=>s.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs);
  const minY=Math.min(...ys),maxY=Math.max(...ys);
  const rx=maxX-minX||1,ry=maxY-minY||1;
  nodes.forEach(n=>{
    n.mx=pad+(n.d.x-minX)/rx*(W-pad*2);
    n.my=pad+(n.d.y-minY)/ry*(H-pad*2);
  });
}

// Collision repulsion + gentle gravity toward canvas center
function relaxMapPos(iters=140){
  const gcx=W*0.5, gcy=H*0.48; // ligeramente arriba del centro geométrico
  for(let it=0;it<iters;it++){
    // 1. Repulsión entre nodos solapados
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=a.mx-b.mx,dy=a.my-b.my;
        const d2=dx*dx+dy*dy;
        const minD=nRadius(a.d)+nRadius(b.d)+3;
        if(d2<minD*minD&&d2>0.001){
          const d=Math.sqrt(d2);
          const push=(minD-d)*0.5/d;
          a.mx+=dx*push;a.my+=dy*push;
          b.mx-=dx*push;b.my-=dy*push;
        }
      }
    }
    // 2. Gravedad suave hacia el centro — decae en las últimas iteraciones
    //    para que la repulsión final refine posiciones sin over-compactar
    const g=0.005*(1-it/(iters*1.4));
    nodes.forEach(n=>{
      n.mx+=(gcx-n.mx)*g;
      n.my+=(gcy-n.my)*g;
    });
  }
  const pad=24;
  nodes.forEach(n=>{
    n.mx=Math.max(pad,Math.min(W-pad,n.mx));
    n.my=Math.max(pad,Math.min(H-pad,n.my));
  });
}

// ── Theme grid positions (replaces cluster arrangement) ───────────────────
function computeClusterPos(){
  // Group nodes by bio_theme, respecting THEME_ORDER
  const themeNodes={};
  nodes.forEach(n=>{
    const t=n.d.bio_theme||"Uncategorized";
    if(!themeNodes[t])themeNodes[t]=[];
    themeNodes[t].push(n);
  });
  const activeThemes=THEME_ORDER.filter(t=>themeNodes[t]?.length>0);
  // Add any unlisted themes (eco-adjacent, etc.)
  Object.keys(themeNodes).forEach(t=>{if(!activeThemes.includes(t))activeThemes.push(t);});

  const ncols=Math.ceil(Math.sqrt(activeThemes.length));
  const nrows=Math.ceil(activeThemes.length/ncols);
  const cellW=W/ncols,cellH=H/nrows;

  // First pass: compute raw ring positions using node-size-aware spacing
  activeThemes.forEach((theme,i)=>{
    const col=i%ncols,row=Math.floor(i/ncols);
    const zx=cellW*(col+.5),zy=cellH*(row+.5);
    const cNodes=(themeNodes[theme]||[]).slice()
      .sort((a,b)=>(b.d.valuation_tier||0)-(a.d.valuation_tier||0));
    if(!cNodes.length)return;

    // Spacing = avg node diameter + gap, never below 20px
    const avgR=cNodes.reduce((s,n)=>s+nRadius(n.d),0)/cNodes.length;
    const spacing=Math.max(avgR*2+10,20);

    let placed=0,ring=0;
    while(placed<cNodes.length&&ring<30){
      const r=ring===0?0:ring*spacing;
      const cap=ring===0?1:Math.max(1,Math.floor(2*Math.PI*r/spacing));
      const slice=cNodes.slice(placed,placed+cap);
      slice.forEach((n,j)=>{
        if(ring===0){n.kx=zx;n.ky=zy;}
        else{
          const angle=(2*Math.PI*j/slice.length)-(Math.PI/2);
          n.kx=zx+Math.cos(angle)*r;
          n.ky=zy+Math.sin(angle)*r;
        }
      });
      placed+=slice.length;
      ring++;
    }
  });

  // Second pass: scale all kx/ky to fill canvas without overflow
  const pad=44;
  const allKx=nodes.map(n=>n.kx),allKy=nodes.map(n=>n.ky);
  const mnX=Math.min(...allKx),mxX=Math.max(...allKx);
  const mnY=Math.min(...allKy),mxY=Math.max(...allKy);
  const scX=(W-pad*2)/(mxX-mnX||1),scY=(H-pad*2)/(mxY-mnY||1);
  const sc=Math.min(scX,scY);
  const ox=pad+(W-pad*2-(mxX-mnX)*sc)/2-mnX*sc;
  const oy=pad+(H-pad*2-(mxY-mnY)*sc)/2-mnY*sc;
  nodes.forEach(n=>{n.kx=n.kx*sc+ox;n.ky=n.ky*sc+oy});
}

function runForceAtlas(iterations){
  iterations=iterations||280;
  const centerX=W/2,centerY=H/2;
  const repulsion=75000,attraction=0.014,gravity=0.0012,desired=85;

  // Unified node array: startups primero, inversores al final
  const fa=[];
  const sIdxMap=new Map(),iIdxMap=new Map();
  nodes.forEach(n=>{sIdxMap.set(n.d.id,fa.length);fa.push({x:0,y:0,vx:0,vy:0,isInv:false,ref:n})});
  invNodes.forEach(iv=>{iIdxMap.set(iv.id,fa.length);fa.push({x:0,y:0,vx:0,vy:0,isInv:true,ref:iv})});

  // Posiciones iniciales: círculo con jitter
  fa.forEach((a,i)=>{
    const angle=Math.PI*2*i/Math.max(1,fa.length);
    const r=180+(i%7)*18;
    a.x=centerX+Math.cos(angle)*r+(Math.random()-.5)*40;
    a.y=centerY+Math.sin(angle)*r+(Math.random()-.5)*40;
  });

  // Índice de aristas
  const faEdges=[];
  graphData.edges.forEach(e=>{
    const si=sIdxMap.get(e.startup_id),ii=iIdxMap.get(e.investor_id);
    if(si!=null&&ii!=null)faEdges.push({si,ii});
  });

  // Simulación Force Atlas
  for(let step=0;step<iterations;step++){
    fa.forEach(a=>{a.vx=0;a.vy=0;});

    // Repulsión entre todos los pares
    for(let i=0;i<fa.length;i++){
      for(let j=i+1;j<fa.length;j++){
        const a=fa[i],b=fa[j];
        const dx=a.x-b.x,dy=a.y-b.y;
        const d2=Math.max(120,dx*dx+dy*dy);
        const d=Math.sqrt(d2);
        const f=repulsion/d2;
        const fx=(dx/d)*f,fy=(dy/d)*f;
        a.vx+=fx;a.vy+=fy;
        b.vx-=fx;b.vy-=fy;
      }
    }

    // Atracción por aristas (spring)
    faEdges.forEach(({si,ii})=>{
      const s=fa[si],v=fa[ii];
      const dx=v.x-s.x,dy=v.y-s.y;
      const dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
      const spring=(dist-desired)*attraction;
      const fx=(dx/dist)*spring,fy=(dy/dist)*spring;
      s.vx+=fx;s.vy+=fy;
      v.vx-=fx;v.vy-=fy;
    });

    // Gravedad + clamp
    fa.forEach(a=>{
      a.vx+=(centerX-a.x)*gravity;
      a.vy+=(centerY-a.y)*gravity;
      a.x=Math.max(40,Math.min(W-40,a.x+a.vx));
      a.y=Math.max(30,Math.min(H-30,a.y+a.vy));
    });
  }

  // Normalizar a [0,1] y guardar
  const allX=fa.map(a=>a.x),allY=fa.map(a=>a.y);
  const mnX=Math.min(...allX),mxX=Math.max(...allX);
  const mnY=Math.min(...allY),mxY=Math.max(...allY);
  const rX=mxX-mnX||1,rY=mxY-mnY||1;
  fa.forEach(a=>{
    const key=a.isInv?'i:'+a.ref.id:'s:'+a.ref.d.id;
    faPositions.set(key,{nx:(a.x-mnX)/rX,ny:(a.y-mnY)/rY});
  });

  graphLayoutReady=true;
  computeGraphPos();
}

// ── Convex hull (Jarvis march) ─────────────────────────────────────────────
function convexHull(pts){
  if(pts.length<3)return pts;
  let lo=0;
  for(let i=1;i<pts.length;i++)if(pts[i][0]<pts[lo][0]||(pts[i][0]===pts[lo][0]&&pts[i][1]<pts[lo][1]))lo=i;
  const hull=[],n=pts.length;let cur=lo;
  do{
    hull.push(pts[cur]);
    let next=(cur+1)%n;
    for(let i=0;i<n;i++){
      const cross=(pts[next][0]-pts[cur][0])*(pts[i][1]-pts[cur][1])-(pts[next][1]-pts[cur][1])*(pts[i][0]-pts[cur][0]);
      if(cross<0)next=i;
    }
    cur=next;
  }while(cur!==lo&&hull.length<=n);
  return hull;
}

// Smooth blob path: inflate hull from centroid, connect with quadratic beziers
function blobPath(pts,pad=22){
  if(!pts||pts.length<2)return null;
  const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;
  const inf=pts.map(([x,y])=>{
    const dx=x-cx,dy=y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;
    return[x+dx/d*pad,y+dy/d*pad];
  });
  const n=inf.length;
  const mids=inf.map(([x,y],i)=>{const nx=inf[(i+1)%n];return[(x+nx[0])/2,(y+nx[1])/2]});
  let d=`M${mids[0][0].toFixed(1)},${mids[0][1].toFixed(1)}`;
  for(let i=0;i<n;i++){
    const c=inf[i],e=mids[(i+1)%n];
    d+=` Q${c[0].toFixed(1)},${c[1].toFixed(1)} ${e[0].toFixed(1)},${e[1].toFixed(1)}`;
  }
  return d+"Z";
}

// Remove points > maxSigma std-devs from centroid (outlier-robust hull)
function corePoints(pts, maxSigma=2.2){
  if(pts.length<6)return pts; // too few to filter
  const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy=pts.reduce((s,p)=>s+p[1],0)/pts.length;
  const dists=pts.map(([x,y])=>Math.sqrt((x-cx)**2+(y-cy)**2));
  const mean=dists.reduce((s,d)=>s+d,0)/dists.length;
  const sd=Math.sqrt(dists.reduce((s,d)=>s+(d-mean)**2,0)/dists.length)||1;
  const filtered=pts.filter((_,i)=>dists[i]<=mean+maxSigma*sd);
  return filtered.length>=3?filtered:pts;
}

function updateHalos(){
  while(gHalos.firstChild)gHalos.removeChild(gHalos.firstChild);
  const any=anyFilter();

  const byTheme={};
  nodes.forEach(n=>{
    const t=n.d.bio_theme||"Uncategorized";
    if(!byTheme[t])byTheme[t]=[];
    byTheme[t].push(n);
  });

  // ── Pasada 1: dibujar blobs y colectar candidatos de label ────────────────
  const lbls=[];
  Object.entries(byTheme).forEach(([theme,cNodes])=>{
    const allPts=cNodes.map(n=>[n.cx,n.cy]);
    const corePts=(()=>{
      const nonOut=cNodes.filter(n=>!n.d.is_outlier).map(n=>[n.cx,n.cy]);
      return nonOut.length>=3?nonOut:allPts;
    })();
    const hullPts=corePoints(corePts);
    const cx=allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
    const cy=allPts.reduce((s,p)=>s+p[1],0)/allPts.length;

    const themeHasMatch=any?cNodes.some(n=>isHl(n.d)):true;
    const color=themeHasMatch?themeCol(theme):"#b5aea6";
    const fillOp=themeHasMatch?(viewMode==="cluster"?"0.08":"0.07"):"0.03";
    const strokeOp=themeHasMatch?(viewMode==="cluster"?"0.22":"0.18"):"0.06";

    if(viewMode==="cluster"){
      const maxR=Math.max(...allPts.map(([x,y])=>Math.sqrt((x-cx)**2+(y-cy)**2)));
      const el=document.createElementNS(NS,"circle");
      el.setAttribute("cx",cx);el.setAttribute("cy",cy);
      el.setAttribute("r",Math.max(maxR+22,28));
      el.setAttribute("fill",color);el.setAttribute("opacity",fillOp);
      el.setAttribute("stroke",color);el.setAttribute("stroke-width","1.5");
      el.setAttribute("stroke-opacity",strokeOp);el.setAttribute("pointer-events","none");
      gHalos.appendChild(el);
    }else{
      const hull=convexHull(hullPts);
      const path=blobPath(hull,hullPts.length===1?28:hullPts.length<4?20:22);
      if(path){
        const el=document.createElementNS(NS,"path");
        el.setAttribute("d",path);
        el.setAttribute("fill",color);el.setAttribute("opacity",fillOp);
        el.setAttribute("stroke",color);el.setAttribute("stroke-width","1.8");
        el.setAttribute("stroke-opacity",strokeOp);el.setAttribute("pointer-events","none");
        gHalos.appendChild(el);
      }
    }

    // Nombres cortos para que los labels sean más compactos
    const LABEL_SHORT={
      "Therapeutics":"Therapeutics",
      "Diagnostics & Health Access":"Diagnostics",
      "Food Systems & Alt Proteins":"Food Systems",
      "Bioinputs & Crop Resilience":"Bioinputs",
      "Nature & Ecosystem Tech":"Nature Tech",
      "Farm Intelligence":"Farm Intel.",
      "Biomaterials & Circular Economy":"Biomaterials",
      "Biomanufacturing & Fermentation Economy":"Biomanufact.",
    };
    const shortName=LABEL_SHORT[theme]||theme.split(" ")[0];
    const fs=11;
    const w=shortName.length*fs*0.58+18, h=fs+10;
    const blobPad=hullPts.length<=1?28:hullPts.length<4?20:22;

    // Radio efectivo del blob: usa corePts (no-outliers) en lugar de los hull-pts sigma-filtrados,
    // para que el label se empuje fuera del cluster real, no solo del núcleo sigma-filtrado
    const rawBlobR=corePts.length>0
      ?Math.max(28,...corePts.map(p=>Math.sqrt((p[0]-cx)**2+(p[1]-cy)**2)))+blobPad
      :38;
    const blobR=Math.min(rawBlobR, 100);

    // Dirección radial desde el centro del canvas hacia el centroide del cluster
    const canvasCx=W/2, canvasCy=H/2;
    const dirX=cx-canvasCx, dirY=cy-canvasCy;
    const dirLen=Math.sqrt(dirX*dirX+dirY*dirY);
    // Si el cluster está muy cerca del centro del canvas, usar dirección hacia arriba
    const ndx=dirLen>60?dirX/dirLen:0;
    const ndy=dirLen>60?dirY/dirLen:-1;
    const pushDist=blobR+h+8;
    const ax=Math.max(w/2+10,Math.min(W-w/2-10, cx+ndx*pushDist));
    const ay=Math.max(h/2+10,Math.min(H-h/2-10, cy+ndy*pushDist));

    lbls.push({
      x:ax, y:ay, ax, ay,
      w, h, fs, shortName, color,
      alpha:themeHasMatch?"0.9":"0.3",
      textOp:themeHasMatch?"0.95":"0.2",
    });
  });

  // ── Pasada 2: búsqueda espiral garantizada ──────────────────────────────
  // Solo evita otros labels — los dots de otros themes son aceptables cerca del borde
  function overlaps(lbl, placed){
    return placed.some(p=>{
      const gx=(lbl.w+p.w)/2+12, gy=(lbl.h+p.h)/2+9;
      return Math.abs(lbl.x-p.x)<gx && Math.abs(lbl.y-p.y)<gy;
    });
  }

  const placed=[];
  lbls.forEach(lbl=>{
    lbl.x=lbl.ax; lbl.y=lbl.ay;
    if(!overlaps(lbl, placed)){placed.push(lbl);return;}

    // Espiral outward: distancia r en pasos de 8px
    const step=8, maxR=Math.min(W,H)*0.5;
    let found=false;
    outer: for(let r=step;r<=maxR;r+=step){
      const nAngles=Math.max(8, Math.round(2*Math.PI*r/step));
      for(let a=0;a<nAngles;a++){
        const angle=2*Math.PI*a/nAngles;
        const tx=Math.max(lbl.w/2+10,Math.min(W-lbl.w/2-10, lbl.ax+r*Math.cos(angle)));
        const ty=Math.max(lbl.h/2+10,Math.min(H-lbl.h/2-10, lbl.ay+r*Math.sin(angle)));
        lbl.x=tx; lbl.y=ty;
        if(!overlaps(lbl, placed)){found=true;break outer;}
      }
    }
    if(!found){lbl.x=lbl.ax;lbl.y=lbl.ay;}
    placed.push(lbl);
  });

  // ── Pasada 3: dibujar labels en posiciones optimizadas ────────────────────
  lbls.forEach(l=>{
    const bg=document.createElementNS(NS,"rect");
    bg.setAttribute("x",(l.x-l.w/2).toFixed(1));
    bg.setAttribute("y",(l.y-l.h/2).toFixed(1));
    bg.setAttribute("width",l.w.toFixed(1));
    bg.setAttribute("height",l.h.toFixed(1));
    bg.setAttribute("fill","rgba(255,252,247,0.9)");
    bg.setAttribute("rx","5");
    bg.setAttribute("pointer-events","none");
    bg.setAttribute("opacity",l.alpha);
    gHalos.appendChild(bg);
    const txt=document.createElementNS(NS,"text");
    txt.setAttribute("x",l.x);txt.setAttribute("y",l.y);
    txt.setAttribute("text-anchor","middle");
    txt.setAttribute("dominant-baseline","middle");
    txt.setAttribute("font-size",l.fs);
    txt.setAttribute("font-weight","700");
    txt.setAttribute("fill",l.color);
    txt.setAttribute("opacity",l.textOp);
    txt.setAttribute("pointer-events","none");
    txt.setAttribute("letter-spacing","0.04em");
    txt.textContent=l.shortName;
    gHalos.appendChild(txt);
  });
}

function updateHighlights(){

// ── Transition between views ───────────────────────────────────────────────
let transitioning=false,transP=1;
let transFrom={},transTo={};
const TRANS_F=45;

function startTrans(toMode){
  transFrom={};transTo={};
  nodes.forEach(n=>{
    transFrom[n.d.id]={x:n.cx,y:n.cy};
    const t=toMode==="map"?{x:n.mx,y:n.my}:toMode==="cluster"?{x:n.kx,y:n.ky}:{x:n.gxs,y:n.gys};
    transTo[n.d.id]=t;
  });
  transP=0;transitioning=true;
}
function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t}

// ── Zoom to theme ─────────────────────────────────────────────────────────
function zoomToCluster(theme){
  const cNodes=nodes.filter(n=>(n.d.bio_theme||"Uncategorized")===theme);
  if(!cNodes.length)return;
  const xs=cNodes.map(n=>n.cx),ys=cNodes.map(n=>n.cy);
  const minX=Math.min(...xs)-40,maxX=Math.max(...xs)+40;
  const minY=Math.min(...ys)-40,maxY=Math.max(...ys)+40;
  const bW=maxX-minX||80,bH=maxY-minY||80;
  const tScale=Math.min(8,Math.min(W/bW,H/bH)*0.82);
  const tPX=W/2-((minX+maxX)/2)*tScale;
  const tPY=H/2-((minY+maxY)/2)*tScale;
  const s0=scale,px0=panX,py0=panY;
  const dur=420,t0=performance.now();
  function step(t){
    const p=Math.min((t-t0)/dur,1),e=eio(p);
    scale=s0+(tScale-s0)*e;panX=px0+(tPX-px0)*e;panY=py0+(tPY-py0)*e;
    applyTf();if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

    document.querySelectorAll(".cr").forEach(r=>r.classList.remove("active","dimmed"));

  });

// ── Animation loop ─────────────────────────────────────────────────────────
let animId=null;
let graphOp=0; // graph overlay opacity 0→1
function loop(){
  if(transitioning){
    transP+=1/TRANS_F;
    if(transP>=1){transP=1;transitioning=false}
    const t=eio(transP);
    nodes.forEach(n=>{
      const f=transFrom[n.d.id],to=transTo[n.d.id];
      if(f&&to){n.cx=f.x+(to.x-f.x)*t;n.cy=f.y+(to.y-f.y)*t}
    });
  }else{
    nodes.forEach(n=>{
      n.cx=viewMode==="map"?n.mx:viewMode==="cluster"?n.kx:n.gxs;
      n.cy=viewMode==="map"?n.my:viewMode==="cluster"?n.ky:n.gys;
    });
  }
  // Fade graph overlay in/out
  const targetOp=viewMode==="graph"?1:0;
  graphOp+=(targetOp-graphOp)*0.08;
  if(Math.abs(graphOp-targetOp)<0.005)graphOp=targetOp;
  const goStr=graphOp.toFixed(3);
  gEdges.setAttribute("opacity",goStr);
  gInvNodes.setAttribute("opacity",goStr);
  gInvLabels.setAttribute("opacity",goStr);
  updateGraphElements();
  updatePositions();
  animId=requestAnimationFrame(loop);
}

function buildClusterList(){
  const list=document.getElementById("cluster-list");
  list.innerHTML="";

  // Show themes in canonical order, then any extras (eco-adjacent, etc.)
  const ordered=[
    ...THEME_ORDER.filter(t=>themeMap.has(t)),
    ...[...themeMap.keys()].filter(t=>!THEME_ORDER.includes(t)),
  ];

  ordered.forEach(theme=>{
    const tm=themeMap.get(theme);
    if(!tm)return;
    const color=tm.color;
    const row=document.createElement("div");
    row.className="cr";row.dataset.theme=theme;
    row.style.setProperty('--cr-color', color);

    const top=document.createElement("div");top.className="cr-top";
    const dot=document.createElement("span");dot.className="cr-dot";dot.style.background=color;
    const name=document.createElement("span");name.className="cr-name";
    name.textContent=theme;
    const cnt=document.createElement("span");cnt.className="cr-count";
    cnt.textContent=tm.count;
    top.appendChild(dot);top.appendChild(name);top.appendChild(cnt);
    row.appendChild(top);

    // Description line
    const desc=THEME_DESC[theme];
    if(desc){
      const dl=document.createElement("div");
      dl.className="cr-desc";
      dl.textContent=desc;
      row.appendChild(dl);
    }

    const tags=document.createElement("div");tags.className="cr-tags";
    // Keyword chips from sub-clusters (most representative, top 3)
    [...tm.subClusters.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([lbl,n])=>{
      const t=document.createElement("span");t.className="ct ct-tech";
      // Extract keyword part after " — " or use full label shortened
      const kw=(lbl.split(" — ")[1]||lbl).replace(/^\w+ — /,"");
      t.textContent=kw;
      tags.appendChild(t);
    });
    // Funded badge
    if(tm.n_funded>0){
      const t=document.createElement("span");t.className="ct";
      t.style.cssText="color:#1f5c3a;border-color:rgba(31,92,58,.28);background:rgba(31,92,58,.06);";
      t.textContent="⬤ "+tm.n_funded+" inv.";tags.appendChild(t);
    }
    row.appendChild(tags);

    row.addEventListener("click",()=>{
      if(activeTheme===theme){
        activeTheme=null;row.classList.remove("active");
        document.querySelectorAll(".cr").forEach(r=>r.classList.remove("dimmed","active"));
      }else{
        activeTheme=theme;
        document.querySelectorAll(".cr").forEach(r=>{
          r.classList.remove("active");
          r.classList.toggle("dimmed",r.dataset.theme!==theme);
        });
        row.classList.add("active");row.classList.remove("dimmed");
        zoomToCluster(theme);
        renderThemeDetail(tm);
      }
      updateHighlights();
      updateBreadcrumbs();
    });
    list.appendChild(row);
  });
}

      ${roundsLabel?`<span class="hov-chip" style="color:#1f5c3a">⬤ ${roundsLabel}</span>`:""}
    </div>
    <div class="hov-small">${s.cluster_label?`<em>${s.cluster_label}</em>`:""}</div>
  `;
  const rect=wrap.getBoundingClientRect();
  let x=e.clientX-rect.left+14,y=e.clientY-rect.top-10;
  if(x+310>W)x=e.clientX-rect.left-320;
  if(y+180>H)y=e.clientY-rect.top-180;
  hovCard.style.left=x+"px";hovCard.style.top=y+"px";
  hovCard.classList.add("vis");
}
function hideHov(){hovTmr=setTimeout(()=>hovCard.classList.remove("vis"),90)}

// ── Filter chips ──────────────────────────────────────────────────────────
const FLAG_MAP={
  'Argentina':'🇦🇷','Brazil':'🇧🇷','Brasil':'🇧🇷','Chile':'🇨🇱',
  'Colombia':'🇨🇴','Mexico':'🇲🇽','México':'🇲🇽','Peru':'🇵🇪','Perú':'🇵🇪',
  'Uruguay':'🇺🇾','Ecuador':'🇪🇨','Paraguay':'🇵🇾','Bolivia':'🇧🇴',
  'Venezuela':'🇻🇪','Costa Rica':'🇨🇷','Panama':'🇵🇦','Guatemala':'🇬🇹',
  'USA':'🇺🇸','US':'🇺🇸','UK':'🇬🇧','Spain':'🇪🇸','España':'🇪🇸'
};

function buildChips(){
  const tc={},ic={},cc={};
  startups.forEach(s=>{
    (s.tech_codes||[]).forEach(c=>{tc[c]=(tc[c]||0)+1});
    (s.industry_codes||[]).forEach(c=>{ic[c]=(ic[c]||0)+1});
    (s.countries||[]).forEach(c=>{cc[c]=(cc[c]||0)+1});
  });
  const tWrap=document.getElementById("tech-chips");
  const iWrap=document.getElementById("ind-chips");
  const cWrap=document.getElementById("country-chips");
  tWrap.innerHTML="";iWrap.innerHTML="";cWrap.innerHTML="";

  // País — multi-select
  Object.entries(cc).sort((a,b)=>b[1]-a[1]).forEach(([country,count])=>{
    const btn=document.createElement("button");
    btn.className="fc";btn.type="button";btn.dataset.country=country;
    const flag=FLAG_MAP[country]||"";
    btn.textContent=(flag?flag+" ":"")+country+" ("+count+")";
    btn.addEventListener("click",()=>{
      activeCountries.has(country)?activeCountries.delete(country):activeCountries.add(country);
      cWrap.querySelectorAll(".fc").forEach(c=>c.classList.toggle("active-country",activeCountries.has(c.dataset.country)));
      updateHighlights();updateBreadcrumbs();
    });
    cWrap.appendChild(btn);
  });

  // Tecnología — multi-select
  Object.entries(tc).sort((a,b)=>b[1]-a[1]).forEach(([code,count])=>{
    const btn=document.createElement("button");
    btn.className="fc";btn.type="button";btn.dataset.code=code;
    btn.textContent=(vTech[code]?.label||code).split("/")[0].trim()+" ("+count+")";
    btn.addEventListener("click",()=>{
      activeTechs.has(code)?activeTechs.delete(code):activeTechs.add(code);
      tWrap.querySelectorAll(".fc").forEach(c=>c.classList.toggle("active-tech",activeTechs.has(c.dataset.code)));
      updateHighlights();updateBreadcrumbs();
    });
    tWrap.appendChild(btn);
  });

  // Industria — multi-select
  Object.entries(ic).sort((a,b)=>b[1]-a[1]).forEach(([code,count])=>{
    const btn=document.createElement("button");
    btn.className="fc";btn.type="button";btn.dataset.code=code;
    btn.textContent=(vInd[code]?.label||code).split("(")[0].trim().split("&")[0].trim()+" ("+count+")";
    btn.addEventListener("click",()=>{
      activeInds.has(code)?activeInds.delete(code):activeInds.add(code);
      iWrap.querySelectorAll(".fc").forEach(c=>c.classList.toggle("active-ind",activeInds.has(c.dataset.code)));
      updateHighlights();updateBreadcrumbs();
    });
    iWrap.appendChild(btn);
  });

  // Botones "limpiar selección" por sección
  document.getElementById("clr-country").addEventListener("click",()=>{
    activeCountries.clear();
    cWrap.querySelectorAll(".fc").forEach(c=>c.classList.remove("active-country"));
    updateHighlights();updateBreadcrumbs();
  });
  document.getElementById("clr-tech").addEventListener("click",()=>{
    activeTechs.clear();
    tWrap.querySelectorAll(".fc").forEach(c=>c.classList.remove("active-tech"));
    updateHighlights();updateBreadcrumbs();
  });
  document.getElementById("clr-ind").addEventListener("click",()=>{
    activeInds.clear();
    iWrap.querySelectorAll(".fc").forEach(c=>c.classList.remove("active-ind"));
    updateHighlights();updateBreadcrumbs();
  });
}

// ── Search ────────────────────────────────────────────────────────────────
const srchIn=document.getElementById("srch-in");
const srchRes=document.getElementById("srch-res");
function norm(s){return String(s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim()}
srchIn.addEventListener("input",()=>{
  const q=norm(srchIn.value);
  if(!q||q.length<2){srchRes.innerHTML="";srchRes.classList.remove("open");return}
  const hits=startups.filter(s=>norm(s.name).includes(q)||norm(s.one_liner).includes(q)).slice(0,10);
  srchRes.innerHTML="";
  hits.forEach(s=>{
    const btn=document.createElement("button");btn.className="srch-item";
    btn.innerHTML=`<span>${s.name}</span><small>${s.country||""} · ${s.bio_theme||"—"}</small>`;
    btn.addEventListener("click",()=>{
      srchIn.value=s.name;srchRes.classList.remove("open");
      searchId=s.id;updateHighlights();updateBreadcrumbs();selectStartup(s);
      const n=nodeMap.get(s.id);
      if(n){panX=W/2-n.cx*scale;panY=H/2-n.cy*scale;applyTf()}
    });
    srchRes.appendChild(btn);
  });
  srchRes.classList.toggle("open",hits.length>0);
});
function resetAll(){
  activeTheme=null;activeTechs.clear();activeInds.clear();activeCountries.clear();searchId=null;
  srchIn.value="";srchRes.classList.remove("open");
  document.querySelectorAll(".fc").forEach(c=>c.classList.remove("active-tech","active-ind","active-country"));
  document.querySelectorAll(".cr").forEach(r=>r.classList.remove("active","dimmed"));
  const fp=document.getElementById("filter-panel");
  fp.classList.remove("open");
  document.getElementById("btn-filter").classList.remove("on","filter-active");
  document.getElementById("detail-pane").innerHTML='<span style="color:var(--muted);font-size:.82rem;">Click a startup or a theme to see details.</span>';
  panX=0;panY=0;scale=1;applyTf();
  if(viewMode!=="map"){
    viewMode="map";
    document.getElementById("btn-map").classList.add("active");
    document.getElementById("btn-cluster").classList.remove("active");
    document.getElementById("btn-graph").classList.remove("active");
    startTrans("map");
  }
  updateHighlights();updateBreadcrumbs();
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")resetAll()});
document.addEventListener("click",e=>{if(!srchIn.contains(e.target))srchRes.classList.remove("open")});

// ── Controls ──────────────────────────────────────────────────────────────
document.getElementById("btn-map").addEventListener("click",()=>{
  if(viewMode==="map")return;
  viewMode="map";
  document.getElementById("btn-map").classList.add("active");
  document.getElementById("btn-cluster").classList.remove("active");
  document.getElementById("btn-graph").classList.remove("active");
  startTrans("map");
});
document.getElementById("btn-cluster").addEventListener("click",()=>{
  if(viewMode==="cluster")return;
  viewMode="cluster";
  document.getElementById("btn-cluster").classList.add("active");
  document.getElementById("btn-map").classList.remove("active");
  document.getElementById("btn-graph").classList.remove("active");
  startTrans("cluster");
});
document.getElementById("btn-graph").addEventListener("click",function(){
  if(viewMode==="graph")return;
  viewMode="graph";
  this.classList.add("active");
  document.getElementById("btn-map").classList.remove("active");
  document.getElementById("btn-cluster").classList.remove("active");
  if(!graphLayoutReady){
    const btn=this;
    btn.textContent="Calculando…";btn.disabled=true;
    setTimeout(()=>{
      runForceAtlas();
      startTrans("graph");
      btn.textContent="Red";btn.disabled=false;
    },20);
  }else{
    startTrans("graph");
  }
});
document.getElementById("btn-labels").addEventListener("click",function(){
  showLabels=!showLabels;this.classList.toggle("on",showLabels);
  nodes.forEach(n=>{if(n.lblEl)n.lblEl.style.display=(nFeatured(n.d)||(showLabels&&nLabeled(n.d)))?"":"none"});
  updateHighlights();
});
document.getElementById("btn-filter").addEventListener("click",function(){
  const panel=document.getElementById("filter-panel");
  panel.classList.toggle("open");
  this.classList.toggle("on",panel.classList.contains("open"));
});
// Pan + zoom
svgEl.addEventListener("mousedown",e=>{
  if(e.target.tagName==="circle")return;
  isPan=true;panSX=e.clientX;panSY=e.clientY;panSPX=panX;panSPY=panY;svgEl.style.cursor="grabbing";
});
window.addEventListener("mousemove",e=>{
  if(!isPan)return;panX=panSPX+(e.clientX-panSX);panY=panSPY+(e.clientY-panSY);applyTf();
});
window.addEventListener("mouseup",()=>{isPan=false;svgEl.style.cursor=""});
svgEl.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=svgEl.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const f=e.deltaY<0?1.12:.89;
  const ns=Math.max(.25,Math.min(8,scale*f));
  panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;applyTf();
},{passive:false});
document.getElementById("z-in").addEventListener("click",()=>{scale=Math.min(8,scale*1.2);applyTf()});
document.getElementById("z-out").addEventListener("click",()=>{scale=Math.max(.25,scale/1.2);applyTf()});
document.getElementById("z-reset").addEventListener("click",()=>{panX=0;panY=0;scale=1;applyTf()});

// Resize — debounced para evitar recálculo por apertura de filtros/breadcrumbs
let roLastW=0,roLastH=0,roTmr=null;
const ro=new ResizeObserver(()=>{
  clearTimeout(roTmr);
  roTmr=setTimeout(()=>{
    const nW=wrap.clientWidth||W0,nH=wrap.clientHeight||H0;
    if(nW===roLastW&&nH===roLastH)return; // sin cambio real
    // Preservar posición del viewport ajustando el pan proporcionalmente
    if(roLastW&&roLastH){
      panX=panX*nW/roLastW;
      panY=panY*nH/roLastH;
    }
    roLastW=nW;roLastH=nH;
    setDims();computeMapPos();relaxMapPos();pushThemeCentroids();computeClusterPos();computeGraphPos();
    nodes.forEach(n=>{
      n.cx=viewMode==="map"?n.mx:viewMode==="cluster"?n.kx:n.gxs;
      n.cy=viewMode==="map"?n.my:viewMode==="cluster"?n.ky:n.gys;
    });
    updatePositions();updateGraphElements();updateHighlights();
    applyTf();
  },120);
});
ro.observe(wrap);

// ── Init ──────────────────────────────────────────────────────────────────
computeMapPos();
relaxMapPos();
pushThemeCentroids();
computeClusterPos();
computeGraphPos();
buildGraphElements();
gEdges.setAttribute("opacity","0");
gInvNodes.setAttribute("opacity","0");
gInvLabels.setAttribute("opacity","0");
// Start in Map mode: set cx/cy from map positions
nodes.forEach(n=>{n.cx=n.mx;n.cy=n.my});
buildSVG();
buildClusterList();
buildChips();
applyTf();
loop();

})();
</script>
