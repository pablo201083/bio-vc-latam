<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capital Network Atlas · BIO LATAM</title>
  <link rel="stylesheet" href="./styles.css?v=20260422p">
  <style>
    html, body.capital-atlas-page {
      height: 100%;
    }
    body.capital-atlas-page {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body.capital-atlas-page .page-shell {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 14px 10px;
      gap: 8px;
      max-width: 100%;
      margin: 0;
    }

    /* ── Hero strip ────────────────────────────────────────────────── */
    .ca-strip {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .ca-strip-title {
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .ca-strip-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ca-strip-stat {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      padding: 3px 10px;
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .ca-strip-stat strong {
      font-weight: 800;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    /* ── Main layout ───────────────────────────────────────────────── */
    .ca-layout {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      gap: 10px;
    }

    /* ── Investor sidebar ──────────────────────────────────────────── */
    .ca-inv-sidebar {
      width: 340px;
      min-width: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      /* No overflow:hidden here — let children manage their own overflow */
    }
    .ca-inv-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(248,243,234,.72));
      flex-shrink: 0;
      border-radius: 20px 20px 0 0;  /* match parent corners */
    }
    .ca-inv-head-title {
      font-size: .9rem;
      font-weight: 800;
      line-height: 1;
      color: var(--ink);
    }
    .ca-inv-head-sub {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .ca-inv-search-wrap {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(217,206,190,.5);
      flex-shrink: 0;
    }
    .ca-inv-search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: .78rem;
      padding: 6px 9px;
      box-sizing: border-box;
    }
    .ca-inv-list {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
      /* flex column — each card sizes to its content, no height collapse */
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Investor card ─────────────────────────────────────────────── */
    .iv {
      border: 1px solid rgba(217,206,190,.7);
      border-radius: 14px;
      background: rgba(255,255,255,.76);
      cursor: pointer;
      transition: border-color 90ms, background 90ms;
      overflow: hidden;       /* clips border-radius */
      flex-shrink: 0;         /* never compress in the flex column */
      min-height: 52px;       /* safety floor */
    }
    .iv:hover { border-color: rgba(92,82,70,.28); background: rgba(255,255,255,.92); }
    .iv.active {
      border-color: var(--accent);
      background: rgba(58,168,163,.06);
    }
    .iv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px 5px;
      min-height: 36px;
    }
    .iv-name {
      font-size: .8rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .iv-count {
      font-size: .68rem;
      font-weight: 800;
      color: var(--muted);
      background: rgba(0,0,0,.07);
      border-radius: 5px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .iv.active .iv-count { background: rgba(15,118,110,.14); color: var(--accent); }
    .iv-preview {
      padding: 0 11px 9px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .iv-theme-bar {
      height: 5px;
      border-radius: 999px;
      background: #eadfce;
      overflow: hidden;
      display: flex;
    }
    .iv-theme-seg { height: 100%; }
    .iv-countries {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .iv-country {
      font-size: .67rem;
      color: var(--muted);
      background: rgba(233,224,210,.55);
      border-radius: 999px;
      padding: 1px 6px;
    }
    /* Accordion detail */
    .iv-detail { display: none; padding: 0 10px 10px; }
    .iv.active .iv-detail { display: block; }
    .iv-det-section {
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    .iv-det-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(217,206,190,.35);
      font-size: .73rem;
    }
    .iv-det-row:last-child { border-bottom: 0; }
    .iv-det-row span { color: var(--muted); }
    .iv-det-row strong { font-weight: 700; color: var(--ink); }
    .iv-det-theme-bar {
      height: 5px;
      border-radius: 999px;
      background: #eadfce;
      overflow: hidden;
      margin: 2px 0;
    }
    .iv-det-theme-bar span { display: block; height: 100%; border-radius: 999px; }
    .iv-type-chip {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 2px 6px;
      flex-shrink: 0;
    }
    .iv-type-fund { background: rgba(217,119,6,.12); color: #92400e; }
    .iv-type-allocator { background: rgba(109,40,217,.12); color: #5b21b6; }
    .iv-type-accelerator { background: rgba(5,150,105,.12); color: #065f46; }

    /* ── Canvas area ───────────────────────────────────────────────── */
    .ca-canvas-area {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .ca-toolbar {
      padding: 7px 12px 6px;
      border-bottom: 1px solid rgba(217,206,190,.44);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ca-stage {
      position: relative;
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 48% 52%, rgba(217,119,6,.04), transparent 40rem),
        linear-gradient(135deg, rgba(255,252,246,.9), rgba(244,238,228,.72));
    }

    /* ── Toolbar controls ──────────────────────────────────────────── */
    .atlas-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 5px 10px;
      font: inherit;
      font-size: .76rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .atlas-button:hover, .atlas-button.active {
      border-color: var(--accent);
      background: rgba(58,168,163,.1);
    }
    .atlas-select {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 5px 8px;
      font-size: .76rem;
    }
    .atlas-search-wrap { position: relative; min-width: 0; flex: 1; max-width: 280px; }
    .atlas-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 5px 9px;
      font-size: .78rem;
      box-sizing: border-box;
    }
    .atlas-search-results {
      position: absolute;
      z-index: 8;
      left: 0; right: 0;
      top: calc(100% + 5px);
      display: none;
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,252,246,.98);
      box-shadow: var(--shadow);
      padding: 5px;
    }
    .atlas-search-results.open { display: grid; gap: 3px; }
    .atlas-search-result {
      border: 0; border-radius: 9px;
      background: transparent; color: var(--ink);
      cursor: pointer; display: grid; gap: 2px;
      padding: 7px 9px; text-align: left; font: inherit;
    }
    .atlas-search-result:hover { background: rgba(58,168,163,.12); }
    .atlas-search-result small { color: var(--muted); font-size: .74rem; }

    /* ── Atlas graph components (used by capital-atlas.js) ─────────── */
    #capital-atlas-svg { display: block; width: 100%; height: 100%; position: relative; z-index: 2; }
    .atlas-tooltip {
      position: absolute; z-index: 7;
      left: 18px; top: 18px;
      width: min(320px, calc(100% - 40px));
      border: 1px solid rgba(217,206,190,.78);
      border-radius: 16px;
      background: rgba(255,252,246,.94);
      box-shadow: 0 20px 54px rgba(54,45,35,.16);
      backdrop-filter: blur(12px);
      padding: 11px 12px;
      opacity: 0; transform: translateY(6px);
      gap: 8px; pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .atlas-tooltip.visible { display: grid; opacity: 1; transform: translateY(0); }
    .tooltip-kicker { color: var(--accent); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 900; }
    .tooltip-title { font-weight: 900; font-size: 1rem; line-height: 1.08; }
    .tooltip-meta { color: var(--muted); font-size: .78rem; line-height: 1.35; }
    .tooltip-chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .tooltip-chip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.84); color: var(--muted); font-size: .72rem; padding: 3px 7px; }
    .tooltip-chip-dot { width: 7px; height: 7px; border-radius: 999px; flex: 0 0 auto; }
    .tooltip-stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px; }
    .tooltip-stat { border: 1px solid rgba(217,206,190,.74); border-radius: 10px; background: rgba(255,255,255,.76); padding: 5px 6px; }
    .tooltip-stat span { display: block; color: var(--muted); font-size: .64rem; }
    .tooltip-stat strong { display: block; margin-top: 2px; font-size: .9rem; }
    .atlas-controls { position: absolute; right: 12px; top: 12px; display: grid; gap: 6px; z-index: 5; }
    .atlas-zoom { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.95); box-shadow: var(--shadow); font: inherit; font-size: .94rem; cursor: pointer; }
    .atlas-zoom.hint { width: auto; min-width: 36px; padding: 0 8px; font-size: .7rem; color: var(--muted); cursor: default; }

    /* Inspector classes (used by capital-atlas.js renderDetail) */
    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 7px; }
    .stat-grid.compact { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px; }
    .stat-card { border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.78); padding: 7px 8px; }
    .stat-label { color: var(--muted); font-size: .72rem; margin-bottom: 3px; }
    .stat-value { font-weight: 800; font-size: 1rem; }
    .ranking-list { display: grid; gap: 7px; }
    .theme-mix-list { display: grid; gap: 8px; }
    .theme-mix-row { display: grid; gap: 4px; }
    .theme-mix-top { display: flex; justify-content: space-between; gap: 8px; color: var(--ink); font-size: .84rem; font-weight: 700; }
    .theme-mix-bar { height: 7px; border-radius: 999px; background: #eadfce; overflow: hidden; display: flex; }
    .theme-mix-fill { height: 100%; }
    .theme-mix-fill.mapped { border-radius: 999px 0 0 999px; }
    .theme-mix-fill.gap { background: rgba(120,108,92,.26); border-radius: 0 999px 999px 0; }
    .theme-mix-foot { color: var(--muted); font-size: .73rem; }
    .ranking-row { border: 1px solid rgba(217,206,190,.78); border-radius: 12px; background: rgba(255,255,255,.76); padding: 8px 9px; cursor: pointer; display: grid; gap: 4px; }
    .ranking-row:hover { border-color: var(--accent); }
    .ranking-row.active { border-color: var(--accent); background: rgba(58,168,163,.1); }
    .ranking-top { display: flex; justify-content: space-between; gap: 8px; color: var(--ink); font-weight: 700; line-height: 1.25; }
    .ranking-meta, .detail-muted { color: var(--muted); font-size: .82rem; line-height: 1.42; }
    .detail-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .detail-chip { border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: .76rem; padding: 3px 8px; }
    .edge-list { display: grid; gap: 6px; max-height: 240px; overflow: auto; }
    .edge-list.compact { max-height: 160px; }
    .edge-item { border: 1px solid rgba(217,206,190,.78); border-radius: 11px; background: rgba(255,255,255,.7); padding: 7px 8px; }
    button.edge-item { color: inherit; font: inherit; text-align: left; cursor: pointer; }
    button.edge-item:hover { border-color: var(--accent); background: rgba(58,168,163,.08); }
    .detail-title-card { border: 1px solid rgba(217,206,190,.78); border-radius: 15px; background: linear-gradient(135deg,rgba(255,255,255,.88),rgba(248,243,234,.78)); padding: 10px 11px; display: grid; gap: 4px; }
    .detail-title-card h3, .detail-block h3 { margin: 0; font-size: .98rem; line-height: 1.12; }
    .detail-title-card p { margin: 3px 0 0; color: var(--muted); font-size: .82rem; line-height: 1.42; }
    .organization-card { border-color: rgba(15,118,110,.22); background: radial-gradient(circle at 92% 0%, rgba(209,244,238,.66), transparent 7rem), linear-gradient(135deg, rgba(255,255,255,.92), rgba(248,243,234,.82)); }
    .organization-kicker { color: var(--accent); font-size: .7rem; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    .org-insight-grid { display: grid; gap: 7px; }
    .org-insight-card { border: 1px solid rgba(217,206,190,.78); border-radius: 13px; background: rgba(255,255,255,.72); padding: 8px 9px; display: grid; gap: 3px; }
    .org-insight-card span { color: var(--muted); font-size: .72rem; }
    .org-insight-card strong { color: #332b22; font-size: .82rem; line-height: 1.35; }
    .detail-subtitle { color: var(--accent); font-size: .8rem; font-weight: 800; }
    .detail-block { display: grid; gap: 7px; padding-top: 3px; }
    .detail-callout { border: 1px solid rgba(15,118,110,.22); border-radius: 13px; background: rgba(209,244,238,.32); padding: 8px 9px; display: grid; gap: 3px; color: var(--muted); font-size: .8rem; line-height: 1.38; }
    .detail-callout strong { color: var(--accent); font-size: .88rem; }
    .detail-bars { display: grid; gap: 7px; }
    .detail-bar-row { display: grid; gap: 3px; }
    .detail-bar-top { display: flex; justify-content: space-between; gap: 8px; font-size: .78rem; font-weight: 800; }
    .detail-bar-track { height: 6px; border-radius: 999px; background: #eadfce; overflow: hidden; }
    .detail-bar-track span { display: block; height: 100%; border-radius: 999px; }
    .detail-bar-foot, .connection-source { color: var(--muted); font-size: .7rem; }
    .detail-country-line { display: flex; flex-wrap: wrap; gap: 4px; }
    .detail-country-line span { border-radius: 999px; background: rgba(233,224,210,.72); color: var(--muted); font-size: .72rem; padding: 2px 6px; }
    .connection-card { display: grid; gap: 3px; }
    .connection-evidence { color: var(--accent); font-size: .74rem; font-weight: 800; }
    .detail-empty { border: 1px dashed rgba(154,140,120,.45); border-radius: 11px; color: var(--muted); padding: 8px 9px; font-size: .8rem; }
    .detail-metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; }
    .detail-metric { border: 1px solid rgba(217,206,190,.76); border-radius: 11px; background: rgba(255,255,255,.76); padding: 7px; }
    .detail-metric span { display: block; color: var(--muted); font-size: .7rem; }
    .detail-metric strong { display: block; font-size: 1rem; margin-top: 2px; }
    .detail-metric.primary { border-color: rgba(15,118,110,.28); background: rgba(209,244,238,.28); }
    .detail-metric.primary strong { color: var(--accent); }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .panel-head h2 { margin: 0; font-size: .88rem; }
    .atlas-note { color: var(--muted); font-size: .73rem; line-height: 1.4; }
    .atlas-map-inspector { display: none; } /* unused in new layout */

  </style>
</head>
<body class="capital-atlas-page">
<div class="page-shell">

  <!-- ── Hero strip ──────────────────────────────────────────────────── -->
  <div class="ca-strip">
    <span class="ca-strip-title">Capital Atlas · BIO LATAM</span>
    <div class="ca-strip-stats">
      <span class="ca-strip-stat"><strong id="stat-funds">—</strong> fondos</span>
      <span class="ca-strip-stat"><strong id="stat-funded">—</strong> startups con capital</span>
      <span class="ca-strip-stat"><strong id="stat-coverage">—</strong> cobertura</span>
      <span class="ca-strip-stat"><strong id="stat-edges">—</strong> edges</span>
    </div>
  </div>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <div class="ca-layout">

    <!-- ── Investor sidebar ──────────────────────────────────────────── -->
    <aside class="ca-inv-sidebar">
      <div class="ca-inv-head">
        <div class="ca-inv-head-title">Inversores</div>
        <div class="ca-inv-head-sub" id="inv-head-sub">Seleccioná un fondo para ver su portfolio</div>
      </div>
      <div class="ca-inv-search-wrap">
        <input id="inv-filter" class="ca-inv-search" type="search" placeholder="Filtrar inversores…" autocomplete="off">
      </div>
      <div class="ca-inv-list" id="ca-inv-list">
        <!-- populated by script -->
      </div>
    </aside>

    <!-- ── Force graph canvas ─────────────────────────────────────────── -->
    <div class="ca-canvas-area">
      <div class="ca-toolbar">
        <div class="atlas-search-wrap">
          <input id="atlas-search" class="atlas-input" type="search" placeholder="Buscar fondo, startup…" autocomplete="off">
          <div id="atlas-search-results" class="atlas-search-results"></div>
        </div>
        <select id="atlas-mode" class="atlas-select">
          <option value="capital_core">Capital Core</option>
          <option value="coverage_gaps">Vacíos</option>
          <option value="co_investment">Co-investment</option>
          <option value="allocator_layer">Allocators</option>
          <option value="full_network" selected>Full Network</option>
        </select>
        <button id="atlas-labels"   class="atlas-button active" type="button">Labels</button>
        <button id="atlas-backbone" class="atlas-button active" type="button">Backbone</button>
        <button id="atlas-universe" class="atlas-button active" type="button">Universo</button>
        <div style="display:flex;gap:5px;margin-left:auto">
          <button id="atlas-run-layout" class="atlas-button" type="button">Reordenar</button>
          <button id="atlas-reset"      class="atlas-button" type="button">Recentrar</button>
          <button id="atlas-clear"      class="atlas-button" type="button">Limpiar</button>
        </div>
      </div>
      <div class="ca-stage">
        <svg id="capital-atlas-svg" width="100%" height="100%" preserveAspectRatio="none"></svg>
        <div id="atlas-tooltip" class="atlas-tooltip"></div>
        <div class="atlas-controls">
          <button class="atlas-zoom hint"   type="button" tabindex="-1">Rueda = zoom</button>
          <button id="atlas-zoom-in"        class="atlas-zoom" type="button">+</button>
          <button id="atlas-zoom-out"       class="atlas-zoom" type="button">−</button>
          <button id="atlas-reset-view"     class="atlas-zoom" type="button">R</button>
        </div>
      </div>
    </div>

  </div><!-- .ca-layout -->

</div><!-- .page-shell -->

<!-- ── Backstage: required by capital-atlas.js, hidden ───────────── -->
<div style="display:none" aria-hidden="true">
  <div id="atlas-ranking"></div>
  <div id="atlas-theme-mix"></div>
  <div id="atlas-summary"></div>
  <div id="atlas-detail"></div>
  <span id="atlas-detail-badge"></span>
  <div id="atlas-note"></div>
  <select id="atlas-theme"><option value="all">Todos</option></select>
  <select id="atlas-country"><option value="all">Todos</option></select>
  <select id="atlas-confidence"><option value="0" selected>Todas</option></select>
  <select id="atlas-source-tier"><option value="all">Toda fuente</option></select>
</div>

<script src="./startup-themes-data.js?v=20260517" defer></script>
<script src="./text-clean.js?v=20260422aa" defer></script>
<script src="./theme-system.js?v=20260430english-semantic" defer></script>
<script src="./semantic-single-level-data.js?v=20260508shared-taxonomy" defer></script>
<script src="./capital-atlas-data.js?v=20260507evidence" defer></script>
<script src="./capital-atlas.js?v=20260519accordion" defer></script>

<script>
document.addEventListener('DOMContentLoaded', function(){

  const D = window.CAPITAL_ATLAS_DATA;
  if (!D || !D.nodes) return;

  // ── Palettes ──────────────────────────────────────────────────────────
  const THEME_PAL = {
    "Therapeutics":                            "#7033BC",
    "Diagnostics & Health Access":             "#1A6DB5",
    "Food Systems & Alt Proteins":             "#C25A2A",
    "Bioinputs & Crop Resilience":             "#2A7A42",
    "Nature & Ecosystem Tech":                 "#127A6E",
    "Farm Intelligence":                       "#2E4E8C",
    "Biomaterials & Circular Economy":         "#8B6D14",
    "Biomanufacturing & Fermentation Economy": "#6B8C3A",
  };
  const THEME_SHORT = {
    "Therapeutics":                            "Therapeutics",
    "Diagnostics & Health Access":             "Diagnostics",
    "Food Systems & Alt Proteins":             "Food Systems",
    "Bioinputs & Crop Resilience":             "Bioinputs",
    "Nature & Ecosystem Tech":                 "Nature Tech",
    "Farm Intelligence":                       "Farm Intel",
    "Biomaterials & Circular Economy":         "Biomaterials",
    "Biomanufacturing & Fermentation Economy": "Biomanufacturing",
  };
  const THEME_ORDER = Object.keys(THEME_PAL);
  const FLAG_MAP = {
    "Brazil":"🇧🇷","Brasil":"🇧🇷","BR":"🇧🇷",
    "Mexico":"🇲🇽","México":"🇲🇽","MX":"🇲🇽",
    "Colombia":"🇨🇴","CO":"🇨🇴",
    "Argentina":"🇦🇷","AR":"🇦🇷",
    "Chile":"🇨🇱","CL":"🇨🇱",
    "Peru":"🇵🇪","Perú":"🇵🇪","PE":"🇵🇪",
    "Uruguay":"🇺🇾","UY":"🇺🇾",
    "Costa Rica":"🇨🇷","CR":"🇨🇷",
    "Ecuador":"🇪🇨","EC":"🇪🇨",
    "Bolivia":"🇧🇴","BO":"🇧🇴",
    "Paraguay":"🇵🇾","PY":"🇵🇾",
    "Panama":"🇵🇦","Panamá":"🇵🇦","PA":"🇵🇦",
    "Guatemala":"🇬🇹","GT":"🇬🇹",
    "USA":"🇺🇸","US":"🇺🇸","United States":"🇺🇸",
  };

  // ── Hero stats ────────────────────────────────────────────────────────
  const funds    = D.nodes.filter(n => n.type === 'fund' || n.type === 'allocator' || n.investor_type);
  const bioInc   = D.nodes.filter(n => n.type === 'startup' && n.scope_decision === 'include');
  const funded   = bioInc.filter(n => n.capital_status === 'capital_mapped');
  const pubEdges = (D.edges||[]).filter(e => e.evidence_tier === 'public_url' || e.audited);
  const pct      = bioInc.length ? Math.round(funded.length / bioInc.length * 100) : 0;
  document.getElementById('stat-funds').textContent    = funds.length;
  document.getElementById('stat-funded').textContent   = funded.length + ' / ' + bioInc.length;
  document.getElementById('stat-coverage').textContent = pct + '%';
  document.getElementById('stat-edges').textContent    = pubEdges.length + ' / ' + (D.edges||[]).length;

  // ── Build investor stats from edges ───────────────────────────────────
  const nodeById = new Map(D.nodes.map(n => [n.id, n]));
  const bioIds   = new Set(bioInc.map(n => n.id));
  const invStats = {};

  (D.edges||[]).forEach(e => {
    if (!bioIds.has(e.target)) return;
    const inv     = nodeById.get(e.source);
    const startup = nodeById.get(e.target);
    if (!inv || !startup) return;
    if (!invStats[e.source]) {
      invStats[e.source] = {
        id: e.source,
        label: inv.label || inv.name || e.source,
        type:  inv.type || inv.investor_type || 'fund',
        subtype: inv.investor_subtype || '',
        count: 0,
        themes: {},
        countries: {},
        startups: [],
      };
    }
    const iv = invStats[e.source];
    iv.count++;
    const t = startup.theme;
    if (t && THEME_PAL[t]) iv.themes[t] = (iv.themes[t]||0)+1;
    (startup.countries||[startup.country]).filter(Boolean).forEach(c => {
      iv.countries[c] = (iv.countries[c]||0)+1;
    });
    iv.startups.push({
      id: startup.id,
      name: startup.label || startup.name || startup.id,
      theme: t,
      valuation_tier: startup.valuation_tier||0,
      country: (startup.countries||[startup.country])[0]||'',
    });
  });

  const investors = Object.values(invStats)
    .sort((a,b) => b.count - a.count);

  document.getElementById('inv-head-sub').textContent =
    investors.length + ' fondos · ' + bioInc.length + ' startups include';

  // ── Render investor list ──────────────────────────────────────────────
  const listEl = document.getElementById('ca-inv-list');
  let activeInvId = null;

  function typeClass(type) {
    if (type === 'allocator') return 'iv-type-allocator';
    if (type === 'accelerator') return 'iv-type-accelerator';
    return 'iv-type-fund';
  }
  function typeLabel(type, subtype) {
    if (type === 'allocator') return 'Allocator';
    if (type === 'accelerator') return 'Aceleradora';
    if (subtype) return subtype.slice(0,12);
    return 'Fund';
  }

  function buildInvDetail(iv) {
    const topThemes = Object.entries(iv.themes)
      .sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxTheme  = topThemes[0]?.[1]||1;
    const topStartups = iv.startups
      .slice().sort((a,b)=>b.valuation_tier-a.valuation_tier||a.name.localeCompare(b.name))
      .slice(0,8);

    let h = '';

    // Theme breakdown
    if (topThemes.length) {
      h += `<div class="iv-det-section">Portfolio por tema</div>`;
      topThemes.forEach(([t,n]) => {
        const col = THEME_PAL[t]||'#888';
        const pct = Math.round(n/iv.count*100);
        h += `<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:2px">
            <span style="color:${col};font-weight:700">${THEME_SHORT[t]||t}</span>
            <span style="color:var(--muted)">${n} startup${n>1?'s':''} · ${pct}%</span>
          </div>
          <div class="iv-det-theme-bar"><span style="width:${pct}%;background:${col};opacity:.82"></span></div>
        </div>`;
      });
    }

    // Top startups
    if (topStartups.length) {
      h += `<div class="iv-det-section">Portfolio destacado</div>`;
      topStartups.forEach(s => {
        const col = THEME_PAL[s.theme]||'#888';
        const flag = FLAG_MAP[s.country]||'';
        const tier = s.valuation_tier>=2?'<span style="font-size:.6rem;color:var(--accent);font-weight:700;margin-left:3px">T'+s.valuation_tier+'</span>':'';
        h += `<div class="iv-det-row">
          <span style="display:flex;align-items:center;gap:5px;min-width:0">
            <span style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0"></span>
            <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</strong>${tier}
          </span>
          <span style="white-space:nowrap;flex-shrink:0">${flag}</span>
        </div>`;
      });
    }

    return h;
  }

  function buildCard(iv) {
    const card = document.createElement('div');
    card.className = 'iv';
    card.dataset.id = iv.id;

    // Theme bar
    const barSegs = THEME_ORDER
      .filter(t => iv.themes[t])
      .map(t => `<div class="iv-theme-seg" style="width:${Math.round(iv.themes[t]/iv.count*100)}%;background:${THEME_PAL[t]};opacity:.84"></div>`)
      .join('');

    // Top 3 countries
    const topCountries = Object.entries(iv.countries)
      .sort((a,b)=>b[1]-a[1]).slice(0,3)
      .map(([c]) => `<span class="iv-country">${FLAG_MAP[c]||''} ${c}</span>`)
      .join('');

    // Dominant theme color for left border
    const domTheme = Object.entries(iv.themes).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const domColor = domTheme ? THEME_PAL[domTheme] : '#aaa';

    card.style.setProperty('--iv-color', domColor);
    card.style.borderLeft = `3px solid ${domColor}`;

    card.innerHTML = `
      <div class="iv-header">
        <span class="iv-name" title="${iv.label}">${iv.label}</span>
        <span class="iv-type-chip ${typeClass(iv.type)}">${typeLabel(iv.type, iv.subtype)}</span>
        <span class="iv-count">${iv.count}</span>
      </div>
      <div class="iv-preview">
        <div class="iv-theme-bar">${barSegs||'<div style="width:100%;background:#ddd;opacity:.4;height:100%"></div>'}</div>
        <div class="iv-countries">${topCountries}</div>
      </div>
      <div class="iv-detail">${buildInvDetail(iv)}</div>
    `;

    card.addEventListener('click', () => {
      const isActive = activeInvId === iv.id;

      // Deactivate all
      listEl.querySelectorAll('.iv').forEach(c => c.classList.remove('active'));

      if (isActive) {
        activeInvId = null;
        if (window.AtlasAPI) { window.AtlasAPI.selectNode(null); window.AtlasAPI.zoomReset(); }
      } else {
        activeInvId = iv.id;
        card.classList.add('active');
        if (window.AtlasAPI) {
          window.AtlasAPI.selectNode(iv.id);
          window.AtlasAPI.zoomToInvestor(iv.id);
        }
      }
    });

    return card;
  }

  // Initial render
  function renderList(filter='') {
    listEl.innerHTML = '';
    const q = filter.toLowerCase().trim();
    const filtered = q
      ? investors.filter(iv => iv.label.toLowerCase().includes(q))
      : investors;
    if (!filtered.length) {
      listEl.innerHTML = `<div style="color:var(--muted);font-size:.76rem;padding:8px 4px">Sin resultados</div>`;
      return;
    }
    filtered.forEach(iv => listEl.appendChild(buildCard(iv)));
  }

  renderList();

  // Filter input
  document.getElementById('inv-filter').addEventListener('input', function() {
    renderList(this.value);
  });

  // When a node is clicked in the graph, sync the sidebar accordion
  // (AtlasAPI.selectNode already handles graph highlighting — we just need to sync the card)
  const origSelect = window.AtlasAPI?.selectNode;
  if (origSelect) {
    // Patch: when graph node click calls renderDetail internally, also sync card
    // We observe via a MutationObserver on #atlas-detail-badge
    const badge = document.getElementById('atlas-detail-badge');
    if (badge) {
      new MutationObserver(() => {
        // Find if selected id matches an investor
        // (The graph sets selectedId internally — we can check which card is active via badge content)
      }).observe(badge, { childList: true, characterData: true, subtree: true });
    }
  }

}); // DOMContentLoaded
</script>

</body>
</html>
