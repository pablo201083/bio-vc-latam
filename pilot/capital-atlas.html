<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capital Network Atlas · BIO LATAM</title>
  <link rel="stylesheet" href="./styles.css?v=20260422p">
  <style>
    html, body.capital-atlas-page {
      height: 100%;
    }
    body.capital-atlas-page {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    body.capital-atlas-page .page-shell {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 14px 10px;
      gap: 8px;
      max-width: 100%;
      margin: 0;
    }

    /* ── Hero strip ────────────────────────────────────────────────── */
    .ca-strip {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .ca-strip-title {
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .ca-strip-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ca-strip-stat {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      padding: 3px 10px;
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .ca-strip-stat strong {
      font-weight: 800;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    /* ── Main layout ───────────────────────────────────────────────── */
    .ca-layout {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      gap: 10px;
    }

    /* ── Investor sidebar ──────────────────────────────────────────── */
    .ca-inv-sidebar {
      width: 340px;
      min-width: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      /* No overflow:hidden here — let children manage their own overflow */
    }
    .ca-inv-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(248,243,234,.72));
      flex-shrink: 0;
      border-radius: 20px 20px 0 0;  /* match parent corners */
    }
    .ca-inv-head-title {
      font-size: .9rem;
      font-weight: 800;
      line-height: 1;
      color: var(--ink);
    }
    .ca-inv-head-sub {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .ca-inv-search-wrap {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(217,206,190,.5);
      flex-shrink: 0;
    }
    .ca-inv-search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: .78rem;
      padding: 6px 9px;
      box-sizing: border-box;
    }
    .ca-inv-list {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
      /* flex column — each card sizes to its content, no height collapse */
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* ── Investor card ─────────────────────────────────────────────── */
    .iv {
      border: 1px solid rgba(217,206,190,.7);
      border-radius: 14px;
      background: rgba(255,255,255,.76);
      cursor: pointer;
      transition: border-color 90ms, background 90ms;
      overflow: hidden;       /* clips border-radius */
      flex-shrink: 0;         /* never compress in the flex column */
      min-height: 52px;       /* safety floor */
    }
    .iv:hover { border-color: rgba(92,82,70,.28); background: rgba(255,255,255,.92); }
    .iv.active {
      border-color: var(--accent);
      background: rgba(58,168,163,.06);
    }
    .iv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px 5px;
      min-height: 36px;
    }
    .iv-name {
      font-size: .8rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .iv-count {
      font-size: .68rem;
      font-weight: 800;
      color: var(--muted);
      background: rgba(0,0,0,.07);
      border-radius: 5px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .iv.active .iv-count { background: rgba(15,118,110,.14); color: var(--accent); }
    .iv-preview {
      padding: 0 11px 9px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .iv-theme-bar {
      height: 5px;
      border-radius: 999px;
      background: #eadfce;
      overflow: hidden;
      display: flex;
    }
    .iv-theme-seg { height: 100%; }
    .iv-countries {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .iv-country {
      font-size: .67rem;
      color: var(--muted);
      background: rgba(233,224,210,.55);
      border-radius: 999px;
      padding: 1px 6px;
    }
    /* Accordion detail */
    .iv-detail { display: none; padding: 0 10px 10px; }
    .iv.active .iv-detail { display: block; }
    .iv-det-section {
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    .iv-det-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(217,206,190,.35);
      font-size: .73rem;
    }
    .iv-det-row:last-child { border-bottom: 0; }
    .iv-det-row span { color: var(--muted); }
    .iv-det-row strong { font-weight: 700; color: var(--ink); }
    .iv-det-theme-bar {
      height: 5px;
      border-radius: 999px;
      background: #eadfce;
      overflow: hidden;
      margin: 2px 0;
    }
    .iv-det-theme-bar span { display: block; height: 100%; border-radius: 999px; }
    .iv-type-chip {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 2px 6px;
      flex-shrink: 0;
    }
    .iv-type-fund { background: rgba(217,119,6,.12); color: #92400e; }
    .iv-type-allocator { background: rgba(109,40,217,.12); color: #5b21b6; }
    .iv-type-accelerator { background: rgba(5,150,105,.12); color: #065f46; }

    /* ── Canvas area ───────────────────────────────────────────────── */
    .ca-canvas-area {
      flex: 1 1 0;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .ca-toolbar {
      padding: 7px 12px 6px;
      border-bottom: 1px solid rgba(217,206,190,.44);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ca-stage {
      position: relative;
      flex: 1 1 0;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 60% 45%, rgba(58,168,163,.035), transparent 55%),
        radial-gradient(ellipse at 28% 68%, rgba(217,119,6,.04), transparent 45%),
        linear-gradient(160deg, rgba(255,252,248,.94), rgba(242,234,220,.8));
    }

    /* ── Toolbar controls ──────────────────────────────────────────── */
    .atlas-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 5px 10px;
      font: inherit;
      font-size: .76rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .atlas-button:hover, .atlas-button.active {
      border-color: var(--accent);
      background: rgba(58,168,163,.1);
    }
    .atlas-select {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 5px 8px;
      font-size: .76rem;
    }
    .atlas-search-wrap { position: relative; min-width: 0; flex: 1; max-width: 280px; }
    .atlas-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 5px 9px;
      font-size: .78rem;
      box-sizing: border-box;
    }
    .atlas-search-results {
      position: absolute;
      z-index: 8;
      left: 0; right: 0;
      top: calc(100% + 5px);
      display: none;
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,252,246,.98);
      box-shadow: var(--shadow);
      padding: 5px;
    }
    .atlas-search-results.open { display: grid; gap: 3px; }
    .atlas-search-result {
      border: 0; border-radius: 9px;
      background: transparent; color: var(--ink);
      cursor: pointer; display: grid; gap: 2px;
      padding: 7px 9px; text-align: left; font: inherit;
    }
    .atlas-search-result:hover { background: rgba(58,168,163,.12); }
    .atlas-search-result small { color: var(--muted); font-size: .74rem; }

    /* ── Atlas graph components (used by capital-atlas.js) ─────────── */
    #capital-atlas-svg { display: block; width: 100%; height: 100%; position: relative; z-index: 2; }
    .atlas-tooltip {
      position: absolute; z-index: 7;
      left: 18px; top: 18px;
      width: min(320px, calc(100% - 40px));
      border: 1px solid rgba(217,206,190,.78);
      border-radius: 16px;
      background: rgba(255,252,246,.94);
      box-shadow: 0 20px 54px rgba(54,45,35,.16);
      backdrop-filter: blur(12px);
      padding: 11px 12px;
      opacity: 0; transform: translateY(6px);
      gap: 8px; pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .atlas-tooltip.visible { display: grid; opacity: 1; transform: translateY(0); }
    .tooltip-kicker { color: var(--accent); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; font-weight: 900; }
    .tooltip-title { font-weight: 900; font-size: 1rem; line-height: 1.08; }
    .tooltip-meta { color: var(--muted); font-size: .78rem; line-height: 1.35; }
    .tooltip-chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .tooltip-chip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.84); color: var(--muted); font-size: .72rem; padding: 3px 7px; }
    .tooltip-chip-dot { width: 7px; height: 7px; border-radius: 999px; flex: 0 0 auto; }
    .tooltip-stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px; }
    .tooltip-stat { border: 1px solid rgba(217,206,190,.74); border-radius: 10px; background: rgba(255,255,255,.76); padding: 5px 6px; }
    .tooltip-stat span { display: block; color: var(--muted); font-size: .64rem; }
    .tooltip-stat strong { display: block; margin-top: 2px; font-size: .9rem; }
    .atlas-controls { position: absolute; right: 12px; top: 12px; display: grid; gap: 6px; z-index: 5; }
    .atlas-zoom { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.95); box-shadow: var(--shadow); font: inherit; font-size: .94rem; cursor: pointer; }
    .atlas-zoom.hint { width: auto; min-width: 36px; padding: 0 8px; font-size: .7rem; color: var(--muted); cursor: default; }

    /* Inspector classes (used by capital-atlas.js renderDetail) */
    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 7px; }
    .stat-grid.compact { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 5px; }
    .stat-card { border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.78); padding: 7px 8px; }
    .stat-label { color: var(--muted); font-size: .72rem; margin-bottom: 3px; }
    .stat-value { font-weight: 800; font-size: 1rem; }
    .ranking-list { display: grid; gap: 7px; }
    .theme-mix-list { display: grid; gap: 8px; }
    .theme-mix-row { display: grid; gap: 4px; }
    .theme-mix-top { display: flex; justify-content: space-between; gap: 8px; color: var(--ink); font-size: .84rem; font-weight: 700; }
    .theme-mix-bar { height: 7px; border-radius: 999px; background: #eadfce; overflow: hidden; display: flex; }
    .theme-mix-fill { height: 100%; }
    .theme-mix-fill.mapped { border-radius: 999px 0 0 999px; }
    .theme-mix-fill.gap { background: rgba(120,108,92,.26); border-radius: 0 999px 999px 0; }
    .theme-mix-foot { color: var(--muted); font-size: .73rem; }
    .ranking-row { border: 1px solid rgba(217,206,190,.78); border-radius: 12px; background: rgba(255,255,255,.76); padding: 8px 9px; cursor: pointer; display: grid; gap: 4px; }
    .ranking-row:hover { border-color: var(--accent); }
    .ranking-row.active { border-color: var(--accent); background: rgba(58,168,163,.1); }
    .ranking-top { display: flex; justify-content: space-between; gap: 8px; color: var(--ink); font-weight: 700; line-height: 1.25; }
    .ranking-meta, .detail-muted { color: var(--muted); font-size: .82rem; line-height: 1.42; }
    .detail-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .detail-chip { border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: .76rem; padding: 3px 8px; }
    .edge-list { display: grid; gap: 6px; max-height: 240px; overflow: auto; }
    .edge-list.compact { max-height: 160px; }
    .edge-item { border: 1px solid rgba(217,206,190,.78); border-radius: 11px; background: rgba(255,255,255,.7); padding: 7px 8px; }
    button.edge-item { color: inherit; font: inherit; text-align: left; cursor: pointer; }
    button.edge-item:hover { border-color: var(--accent); background: rgba(58,168,163,.08); }
    .detail-title-card { border: 1px solid rgba(217,206,190,.78); border-radius: 15px; background: linear-gradient(135deg,rgba(255,255,255,.88),rgba(248,243,234,.78)); padding: 10px 11px; display: grid; gap: 4px; }
    .detail-title-card h3, .detail-block h3 { margin: 0; font-size: .98rem; line-height: 1.12; }
    .detail-title-card p { margin: 3px 0 0; color: var(--muted); font-size: .82rem; line-height: 1.42; }
    .organization-card { border-color: rgba(15,118,110,.22); background: radial-gradient(circle at 92% 0%, rgba(209,244,238,.66), transparent 7rem), linear-gradient(135deg, rgba(255,255,255,.92), rgba(248,243,234,.82)); }
    .organization-kicker { color: var(--accent); font-size: .7rem; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    .org-insight-grid { display: grid; gap: 7px; }
    .org-insight-card { border: 1px solid rgba(217,206,190,.78); border-radius: 13px; background: rgba(255,255,255,.72); padding: 8px 9px; display: grid; gap: 3px; }
    .org-insight-card span { color: var(--muted); font-size: .72rem; }
    .org-insight-card strong { color: #332b22; font-size: .82rem; line-height: 1.35; }
    .detail-subtitle { color: var(--accent); font-size: .8rem; font-weight: 800; }
    .detail-block { display: grid; gap: 7px; padding-top: 3px; }
    .detail-callout { border: 1px solid rgba(15,118,110,.22); border-radius: 13px; background: rgba(209,244,238,.32); padding: 8px 9px; display: grid; gap: 3px; color: var(--muted); font-size: .8rem; line-height: 1.38; }
    .detail-callout strong { color: var(--accent); font-size: .88rem; }
    .detail-bars { display: grid; gap: 7px; }
    .detail-bar-row { display: grid; gap: 3px; }
    .detail-bar-top { display: flex; justify-content: space-between; gap: 8px; font-size: .78rem; font-weight: 800; }
    .detail-bar-track { height: 6px; border-radius: 999px; background: #eadfce; overflow: hidden; }
    .detail-bar-track span { display: block; height: 100%; border-radius: 999px; }
    .detail-bar-foot, .connection-source { color: var(--muted); font-size: .7rem; }
    .detail-country-line { display: flex; flex-wrap: wrap; gap: 4px; }
    .detail-country-line span { border-radius: 999px; background: rgba(233,224,210,.72); color: var(--muted); font-size: .72rem; padding: 2px 6px; }
    .connection-card { display: grid; gap: 3px; }
    .connection-evidence { color: var(--accent); font-size: .74rem; font-weight: 800; }
    .detail-empty { border: 1px dashed rgba(154,140,120,.45); border-radius: 11px; color: var(--muted); padding: 8px 9px; font-size: .8rem; }
    .detail-metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 6px; }
    .detail-metric { border: 1px solid rgba(217,206,190,.76); border-radius: 11px; background: rgba(255,255,255,.76); padding: 7px; }
    .detail-metric span { display: block; color: var(--muted); font-size: .7rem; }
    .detail-metric strong { display: block; font-size: 1rem; margin-top: 2px; }
    .detail-metric.primary { border-color: rgba(15,118,110,.28); background: rgba(209,244,238,.28); }
    .detail-metric.primary strong { color: var(--accent); }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .panel-head h2 { margin: 0; font-size: .88rem; }
    .atlas-note { color: var(--muted); font-size: .73rem; line-height: 1.4; }
    .atlas-map-inspector { display: none; }

    /* ── View switcher ─────────────────────────────────────────────── */
    .vs-group {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .vs-btn {
      border: 0;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.82);
      color: var(--muted);
      font: inherit;
      font-size: .74rem;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 80ms, color 80ms;
    }
    .vs-btn:last-child { border-right: 0; }
    .vs-btn:hover { background: rgba(255,255,255,1); color: var(--ink); }
    .vs-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .ca-net-controls { display: flex; gap: 5px; align-items: center; }
    .tb-divider {
      width: 1px; height: 20px; background: var(--line); flex-shrink: 0; margin: 0 2px;
    }
    .tb-toggle-group {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .tb-toggle {
      border: 0;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.82);
      color: var(--muted);
      font: inherit;
      font-size: .8rem;
      font-weight: 600;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 80ms, color 80ms;
      min-width: 30px;
    }
    .tb-toggle:last-child { border-right: 0; }
    .tb-toggle:hover { background: #fff; color: var(--ink); }
    .tb-toggle.active {
      background: rgba(15,118,110,.10);
      color: var(--accent);
      font-weight: 700;
    }

    /* ── Canvas view panels ────────────────────────────────────────── */
    .ca-view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .ca-view.active { display: block; }

    /* ── Radial view ───────────────────────────────────────────────── */
    #radial-svg { display: block; width: 100%; height: 100%; }
    .radial-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .72rem;
      color: var(--muted);
      background: rgba(255,252,246,.82);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 12px;
      pointer-events: none;
    }

    /* ── Matrix view ───────────────────────────────────────────────── */
    #view-matrix { overflow: hidden; }
    #view-matrix.active { display: flex; align-items: center; justify-content: center; }
    #matrix-svg { display: block; max-width: 100%; max-height: 100%; }

  </style>
</head>
<body class="capital-atlas-page">
<div class="page-shell">

  <!-- ── Hero strip ──────────────────────────────────────────────────── -->
  <div class="ca-strip">
    <span class="ca-strip-title">Capital Atlas · BIO LATAM</span>
    <div class="ca-strip-stats">
      <span class="ca-strip-stat"><strong id="stat-funds">—</strong> fondos</span>
      <span class="ca-strip-stat"><strong id="stat-funded">—</strong> startups con capital</span>
      <span class="ca-strip-stat"><strong id="stat-coverage">—</strong> cobertura</span>
      <span class="ca-strip-stat"><strong id="stat-edges">—</strong> edges</span>
    </div>
  </div>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <div class="ca-layout">

    <!-- ── Investor sidebar ──────────────────────────────────────────── -->
    <aside class="ca-inv-sidebar">
      <div class="ca-inv-head">
        <div class="ca-inv-head-title">Inversores</div>
        <div class="ca-inv-head-sub" id="inv-head-sub">Seleccioná un fondo para ver su portfolio</div>
      </div>
      <div class="ca-inv-search-wrap">
        <input id="inv-filter" class="ca-inv-search" type="search" placeholder="Filtrar inversores…" autocomplete="off">
      </div>
      <div class="ca-inv-list" id="ca-inv-list">
        <!-- populated by script -->
      </div>
    </aside>

    <!-- ── Canvas area ────────────────────────────────────────────────── -->
    <div class="ca-canvas-area">
      <div class="ca-toolbar">
        <!-- View mode switcher -->
        <div class="vs-group">
          <button class="vs-btn active" data-view="network" type="button">🕸 Red</button>
          <button class="vs-btn"        data-view="radial"  type="button">◎ Radial</button>
          <button class="vs-btn"        data-view="matrix"  type="button">▦ Matriz</button>
        </div>

        <div class="tb-divider"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){

  const D = window.CAPITAL_ATLAS_DATA;
  if (!D || !D.nodes) return;
  const NS = 'http://www.w3.org/2000/svg';

  // ── Palettes ──────────────────────────────────────────────────────────
  const THEME_PAL = {
    "Therapeutics":                            "#7033BC",
    "Diagnostics & Health Access":             "#1A6DB5",
    "Food Systems & Alt Proteins":             "#C25A2A",
    "Bioinputs & Crop Resilience":             "#2A7A42",
    "Nature & Ecosystem Tech":                 "#127A6E",
    "Farm Intelligence":                       "#2E4E8C",
    "Biomaterials & Circular Economy":         "#8B6D14",
    "Biomanufacturing & Fermentation Economy": "#6B8C3A",
  };
  const THEME_SHORT = {
    "Therapeutics":                            "Therapeutics",
    "Diagnostics & Health Access":             "Diagnostics",
    "Food Systems & Alt Proteins":             "Food Systems",
    "Bioinputs & Crop Resilience":             "Bioinputs",
    "Nature & Ecosystem Tech":                 "Nature Tech",
    "Farm Intelligence":                       "Farm Intel",
    "Biomaterials & Circular Economy":         "Biomaterials",
    "Biomanufacturing & Fermentation Economy": "Biomanufacturing",
  };
  const THEME_ORDER = Object.keys(THEME_PAL);
  const FLAG_MAP = {
    "Brazil":"🇧🇷","Brasil":"🇧🇷","BR":"🇧🇷",
    "Mexico":"🇲🇽","México":"🇲🇽","MX":"🇲🇽",
    "Colombia":"🇨🇴","CO":"🇨🇴",
    "Argentina":"🇦🇷","AR":"🇦🇷",
    "Chile":"🇨🇱","CL":"🇨🇱",
    "Peru":"🇵🇪","Perú":"🇵🇪","PE":"🇵🇪",
    "Uruguay":"🇺🇾","UY":"🇺🇾",
    "Costa Rica":"🇨🇷","CR":"🇨🇷",
    "Ecuador":"🇪🇨","EC":"🇪🇨",
    "Bolivia":"🇧🇴","BO":"🇧🇴",
    "Paraguay":"🇵🇾","PY":"🇵🇾",
    "Panama":"🇵🇦","Panamá":"🇵🇦","PA":"🇵🇦",
    "Guatemala":"🇬🇹","GT":"🇬🇹",
    "USA":"🇺🇸","US":"🇺🇸","United States":"🇺🇸",
  };

  // ── Hero stats ────────────────────────────────────────────────────────
  const funds    = D.nodes.filter(n => n.type === 'fund' || n.type === 'allocator' || n.investor_type);
  const bioInc   = D.nodes.filter(n => n.type === 'startup' && n.scope_decision === 'include');
  const funded   = bioInc.filter(n => n.capital_status === 'capital_mapped');
  const pubEdges = (D.edges||[]).filter(e => e.evidence_tier === 'public_url' || e.audited);
  const pct      = bioInc.length ? Math.round(funded.length / bioInc.length * 100) : 0;
  document.getElementById('stat-funds').textContent    = funds.length;
  document.getElementById('stat-funded').textContent   = funded.length + ' / ' + bioInc.length;
  document.getElementById('stat-coverage').textContent = pct + '%';
  document.getElementById('stat-edges').textContent    = pubEdges.length + ' / ' + (D.edges||[]).length;

  // ── Build investor stats from edges ───────────────────────────────────
  const nodeById = new Map(D.nodes.map(n => [n.id, n]));
  const bioIds   = new Set(bioInc.map(n => n.id));
  const invStats = {};

  (D.edges||[]).forEach(e => {
    if (!bioIds.has(e.target)) return;
    const inv     = nodeById.get(e.source);
    const startup = nodeById.get(e.target);
    if (!inv || !startup) return;
    if (!invStats[e.source]) {
      invStats[e.source] = {
        id: e.source,
        label: inv.label || inv.name || e.source,
        type:  inv.type || inv.investor_type || 'fund',
        subtype: inv.investor_subtype || '',
        count: 0,
        themes: {},
        countries: {},
        startups: [],
      };
    }
    const iv = invStats[e.source];
    iv.count++;
    const t = startup.theme;
    if (t && THEME_PAL[t]) iv.themes[t] = (iv.themes[t]||0)+1;
    (startup.countries||[startup.country]).filter(Boolean).forEach(c => {
      iv.countries[c] = (iv.countries[c]||0)+1;
    });
    iv.startups.push({
      id: startup.id,
      name: startup.label || startup.name || startup.id,
      theme: t,
      valuation_tier: startup.valuation_tier||0,
      degree: Number(startup.degree||startup.visible_degree||0),
      country: (startup.countries||[startup.country])[0]||'',
    });
  });

  const investors = Object.values(invStats)
    .sort((a,b) => b.count - a.count);

  document.getElementById('inv-head-sub').textContent =
    investors.length + ' fondos · ' + bioInc.length + ' startups include';

  // ── Render investor list ──────────────────────────────────────────────
  const listEl = document.getElementById('ca-inv-list');
  let activeInvId = null;

  function typeClass(type) {
    if (type === 'allocator') return 'iv-type-allocator';
    if (type === 'accelerator') return 'iv-type-accelerator';
    return 'iv-type-fund';
  }
  function typeLabel(type, subtype) {
    if (type === 'allocator') return 'Allocator';
    if (type === 'accelerator') return 'Aceleradora';
    if (subtype) return subtype.slice(0,12);
    return 'Fund';
  }

  function buildInvDetail(iv) {
    const topThemes = Object.entries(iv.themes)
      .sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxTheme  = topThemes[0]?.[1]||1;
    const topStartups = iv.startups
      .slice().sort((a,b) => b.valuation_tier - a.valuation_tier || b.degree - a.degree)
      .slice(0,8);

    let h = '';

    // Theme breakdown
    if (topThemes.length) {
      h += `<div class="iv-det-section">Portfolio por tema</div>`;
      topThemes.forEach(([t,n]) => {
        const col = THEME_PAL[t]||'#888';
        const pct = Math.round(n/iv.count*100);
        h += `<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:2px">
            <span style="color:${col};font-weight:700">${THEME_SHORT[t]||t}</span>
            <span style="color:var(--muted)">${n} startup${n>1?'s':''} · ${pct}%</span>
          </div>
          <div class="iv-det-theme-bar"><span style="width:${pct}%;background:${col};opacity:.82"></span></div>
        </div>`;
      });
    }

    // Top startups
    if (topStartups.length) {
      h += `<div class="iv-det-section">Portfolio destacado</div>`;
      topStartups.forEach(s => {
        const col = THEME_PAL[s.theme]||'#888';
        const flag = FLAG_MAP[s.country]||'';
        const tier = s.valuation_tier>=2?'<span style="font-size:.6rem;color:var(--accent);font-weight:700;margin-left:3px">T'+s.valuation_tier+'</span>':'';
        h += `<div class="iv-det-row">
          <span style="display:flex;align-items:center;gap:5px;min-width:0">
            <span style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0"></span>
            <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</strong>${tier}
          </span>
          <span style="white-space:nowrap;flex-shrink:0">${flag}</span>
        </div>`;
      });
    }

    return h;
  }

  function buildCard(iv) {
    const card = document.createElement('div');
    card.className = 'iv';
    card.dataset.id = iv.id;

    // Theme bar
    const barSegs = THEME_ORDER
      .filter(t => iv.themes[t])
      .map(t => `<div class="iv-theme-seg" style="width:${Math.round(iv.themes[t]/iv.count*100)}%;background:${THEME_PAL[t]};opacity:.84"></div>`)
      .join('');

    // Top 3 countries
    const topCountries = Object.entries(iv.countries)
      .sort((a,b)=>b[1]-a[1]).slice(0,3)
      .map(([c]) => `<span class="iv-country">${FLAG_MAP[c]||''} ${c}</span>`)
      .join('');

    // Dominant theme color for left border
    const domTheme = Object.entries(iv.themes).sort((a,b)=>b[1]-a[1])[0]?.[0];
    const domColor = domTheme ? THEME_PAL[domTheme] : '#aaa';

    card.style.setProperty('--iv-color', domColor);
    card.style.borderLeft = `3px solid ${domColor}`;

    card.innerHTML = `
      <div class="iv-header">
        <span class="iv-name" title="${iv.label}">${iv.label}</span>
        <span class="iv-type-chip ${typeClass(iv.type)}">${typeLabel(iv.type, iv.subtype)}</span>
        <span class="iv-count">${iv.count}</span>
      </div>
      <div class="iv-preview">
        <div class="iv-theme-bar">${barSegs||'<div style="width:100%;background:#ddd;opacity:.4;height:100%"></div>'}</div>
        <div class="iv-countries">${topCountries}</div>
      </div>
      <div class="iv-detail">${buildInvDetail(iv)}</div>
    `;

    card.addEventListener('click', () => {
      setActiveInvestor(activeInvId === iv.id ? null : iv.id);
    });

    return card;
  }

  // Initial render
  function renderList(filter='') {
    listEl.innerHTML = '';
    const q = filter.toLowerCase().trim();
    const filtered = q
      ? investors.filter(iv => iv.label.toLowerCase().includes(q))
      : investors;
    if (!filtered.length) {
      listEl.innerHTML = `<div style="color:var(--muted);font-size:.76rem;padding:8px 4px">Sin resultados</div>`;
      return;
    }
    filtered.forEach(iv => listEl.appendChild(buildCard(iv)));
  }

  renderList();

  // Filter input
  document.getElementById('inv-filter').addEventListener('input', function() {
    renderList(this.value);
  });

  // ── View switching ──────────────────────────────────────────────────────
  let currentView = 'network';

  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.vs-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.view === view));
    document.querySelectorAll('.ca-view').forEach(v =>
      v.classList.toggle('active', v.id === 'view-' + view));
    document.getElementById('net-controls').style.display =
      view === 'network' ? 'flex' : 'none';
    if (view === 'radial') renderRadial(activeInvId);
    if (view === 'matrix') renderMatrix();
  }

  document.querySelectorAll('.vs-btn').forEach(btn =>
    btn.addEventListener('click', () => switchView(btn.dataset.view)));

  // Radial hint acts as back button in focus mode
  document.getElementById('radial-hint').addEventListener('click', () => {
    if (activeInvId && currentView === 'radial') setActiveInvestor(null);
  });

  // ── Active investor coordinator ──────────────────────────────────────────
  function setActiveInvestor(id) {
    activeInvId = id;
    listEl.querySelectorAll('.iv').forEach(c =>
      c.classList.toggle('active', c.dataset.id === id));

    if (currentView === 'network') {
      if (window.AtlasAPI) {
        window.AtlasAPI.selectNode(id);
        if (id) window.AtlasAPI.zoomToInvestor(id);
        else     window.AtlasAPI.zoomReset();
      }
    } else if (currentView === 'radial') {
      renderRadial(id);
    } else if (currentView === 'matrix') {
      highlightMatrixRow(id);
    }
  }

  // ── Radial view ──────────────────────────────────────────────────────────
  function renderRadial(selectedId) {
    const svg   = document.getElementById('radial-svg');
    const hint  = document.getElementById('radial-hint');
    const stage = document.querySelector('.ca-stage');
    const W = stage ? stage.clientWidth  : 800;
    const H = stage ? stage.clientHeight : 600;
    svg.innerHTML = '';

    if (!selectedId) {
      hint.style.cursor = 'default';
      hint.textContent  = 'Seleccioná un inversor para ver su portfolio en detalle';
      renderRadialOverview(svg, W, H);
    } else {
      const iv = invStats[selectedId];
      if (!iv) { renderRadialOverview(svg, W, H); return; }
      hint.style.cursor = 'pointer';
      hint.innerHTML = '← Volver · <strong>' + iv.label + '</strong> · ' + iv.count + ' startups';
      renderRadialFocus(svg, W, H, iv);
    }
  }

  function renderRadialOverview(svg, W, H) {
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const topInv = investors.slice(0, 32);
    const cx = W / 2, cy = H / 2;

    // Build bubble data with spiral initial placement
    const bubbles = topInv.map((iv, i) => {
      const domTheme = Object.entries(iv.themes).sort((a,b) => b[1]-a[1])[0]?.[0];
      const angle = i * 2.3998; // golden angle
      const rad   = Math.sqrt(i) * 36;
      return {
        id:    iv.id,
        label: iv.label,
        count: iv.count,
        r:     Math.max(16, Math.min(56, Math.sqrt(iv.count) * 10)),
        color: domTheme ? THEME_PAL[domTheme] : '#888',
        x: cx + Math.cos(angle) * rad,
        y: cy + Math.sin(angle) * rad,
        vx: 0, vy: 0,
      };
    });

    // Force relax — repulsion + centering
    for (let iter = 0; iter < 240; iter++) {
      const alpha = Math.pow(1 - iter / 240, 1.4);
      for (let i = 0; i < bubbles.length; i++) {
        for (let j = i + 1; j < bubbles.length; j++) {
          const dx = (bubbles[j].x - bubbles[i].x) || 0.01;
          const dy = (bubbles[j].y - bubbles[i].y) || 0.01;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minD = bubbles[i].r + bubbles[j].r + 5;
          if (dist < minD) {
            const f = (minD - dist) / dist * 0.44 * alpha;
            bubbles[i].vx -= dx * f; bubbles[i].vy -= dy * f;
            bubbles[j].vx += dx * f; bubbles[j].vy += dy * f;
          }
        }
        bubbles[i].vx += (cx - bubbles[i].x) * 0.012 * alpha;
        bubbles[i].vy += (cy - bubbles[i].y) * 0.012 * alpha;
      }
      bubbles.forEach(b => {
        b.x += b.vx; b.y += b.vy;
        b.vx *= 0.62; b.vy *= 0.62;
      });
    }

    const g = document.createElementNS(NS, 'g');
    bubbles.forEach(b => {
      const circle = document.createElementNS(NS, 'circle');
      circle.setAttribute('cx', b.x); circle.setAttribute('cy', b.y);
      circle.setAttribute('r', b.r);
      circle.setAttribute('fill', b.color + '22');
      circle.setAttribute('stroke', b.color);
      circle.setAttribute('stroke-width', '1.5');
      circle.style.cursor = 'pointer';
      circle.addEventListener('click', () => setActiveInvestor(b.id));
      circle.addEventListener('mouseenter', () => circle.setAttribute('fill', b.color + '50'));
      circle.addEventListener('mouseleave', () => circle.setAttribute('fill', b.color + '22'));
      g.appendChild(circle);

      const fsize = Math.max(8, Math.min(11, b.r * 0.30));
      const maxCh = Math.max(4, Math.floor(b.r * 0.22));
      const short  = b.label.length > maxCh ? b.label.slice(0, maxCh) + '…' : b.label;

      const t1 = document.createElementNS(NS, 'text');
      t1.setAttribute('x', b.x); t1.setAttribute('y', b.r >= 26 ? b.y - 4 : b.y);
      t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('dominant-baseline', 'middle');
      t1.setAttribute('font-size', fsize); t1.setAttribute('font-weight', '700');
      t1.setAttribute('font-family', 'inherit'); t1.setAttribute('fill', b.color);
      t1.setAttribute('pointer-events', 'none');
      t1.textContent = short;
      g.appendChild(t1);

      if (b.r >= 26) {
        const t2 = document.createElementNS(NS, 'text');
        t2.setAttribute('x', b.x); t2.setAttribute('y', b.y + fsize + 1);
        t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('dominant-baseline', 'middle');
        t2.setAttribute('font-size', Math.max(7, fsize - 2)); t2.setAttribute('font-weight', '600');
        t2.setAttribute('font-family', 'inherit'); t2.setAttribute('fill', b.color);
        t2.setAttribute('opacity', '0.68'); t2.setAttribute('pointer-events', 'none');
        t2.textContent = b.count;
        g.appendChild(t2);
      }
    });
    svg.appendChild(g);
  }

  function renderRadialFocus(svg, W, H, iv) {
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    const cx = W / 2, cy = H / 2;
    const innerR = 52;
    const outerR = Math.min(W, H) * 0.36;

    // Group startups by theme
    const byTheme = {};
    iv.startups.forEach(s => {
      const t = s.theme || '—';
      if (!byTheme[t]) byTheme[t] = [];
      byTheme[t].push(s);
    });
    const themes = Object.keys(byTheme).sort((a,b) => byTheme[b].length - byTheme[a].length);
    const total  = iv.startups.length;

    const g = document.createElementNS(NS, 'g');
    let angleStart = -Math.PI / 2;

    themes.forEach(theme => {
      const count  = byTheme[theme].length;
      const sweep  = (count / total) * Math.PI * 2;
      const midA   = angleStart + sweep / 2;
      const color  = THEME_PAL[theme] || '#888';
      const large  = sweep > Math.PI ? 1 : 0;
      const r1 = outerR - 24, r2 = outerR + 22;

      // Annular sector
      const c0 = Math.cos(angleStart), s0 = Math.sin(angleStart);
      const c1 = Math.cos(angleStart + sweep), s1 = Math.sin(angleStart + sweep);
      const d = [
        'M', cx+c0*r1, cy+s0*r1,
        'A', r1, r1, 0, large, 1, cx+c1*r1, cy+s1*r1,
        'L', cx+c1*r2, cy+s1*r2,
        'A', r2, r2, 0, large, 0, cx+c0*r2, cy+s0*r2,
        'Z',
      ].join(' ');
      const sector = document.createElementNS(NS, 'path');
      sector.setAttribute('d', d);
      sector.setAttribute('fill', color + '1e');
      sector.setAttribute('stroke', color + '4a');
      sector.setAttribute('stroke-width', '0.8');
      g.appendChild(sector);

      // Theme label
      const tl = document.createElementNS(NS, 'text');
      tl.setAttribute('x', cx + Math.cos(midA) * (r2 + 16));
      tl.setAttribute('y', cy + Math.sin(midA) * (r2 + 16));
      tl.setAttribute('text-anchor', 'middle'); tl.setAttribute('dominant-baseline', 'middle');
      tl.setAttribute('font-size', '9'); tl.setAttribute('font-weight', '700');
      tl.setAttribute('font-family', 'inherit'); tl.setAttribute('fill', color);
      tl.setAttribute('pointer-events', 'none');
      tl.textContent = THEME_SHORT[theme] || theme.split(' ')[0];
      g.appendChild(tl);

      // Startup dots + labels
      byTheme[theme].forEach((s, i) => {
        const a  = angleStart + (i + 0.5) / count * sweep;
        const sx = cx + Math.cos(a) * outerR;
        const sy = cy + Math.sin(a) * outerR;

        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', cx); line.setAttribute('y1', cy);
        line.setAttribute('x2', sx); line.setAttribute('y2', sy);
        line.setAttribute('stroke', color); line.setAttribute('stroke-width', '0.7');
        line.setAttribute('opacity', '0.22');
        g.appendChild(line);

        const dot = document.createElementNS(NS, 'circle');
        dot.setAttribute('cx', sx); dot.setAttribute('cy', sy); dot.setAttribute('r', 5);
        dot.setAttribute('fill', color); dot.setAttribute('opacity', '0.76');
        g.appendChild(dot);

        if (count <= 18 || s.valuation_tier >= 2) {
          const anchor = Math.cos(a) >= 0 ? 'start' : 'end';
          const st = document.createElementNS(NS, 'text');
          st.setAttribute('x', sx + Math.cos(a) * 9);
          st.setAttribute('y', sy + Math.sin(a) * 9);
          st.setAttribute('text-anchor', anchor); st.setAttribute('dominant-baseline', 'middle');
          st.setAttribute('font-size', '7.5'); st.setAttribute('font-family', 'inherit');
          st.setAttribute('fill', color); st.setAttribute('opacity', '0.82');
          st.setAttribute('pointer-events', 'none');
          const nm = s.name.length > 20 ? s.name.slice(0, 18) + '…' : s.name;
          st.textContent = nm;
          g.appendChild(st);
        }
      });

      angleStart += sweep;
    });

    // Center glow
    const domTheme = Object.entries(iv.themes).sort((a,b) => b[1]-a[1])[0]?.[0];
    const domColor = domTheme ? THEME_PAL[domTheme] : '#3AA8A3';

    const glow = document.createElementNS(NS, 'circle');
    glow.setAttribute('cx', cx); glow.setAttribute('cy', cy); glow.setAttribute('r', innerR + 10);
    glow.setAttribute('fill', domColor + '14');
    glow.setAttribute('stroke', domColor + '35'); glow.setAttribute('stroke-width', '1');
    g.appendChild(glow);

    const center = document.createElementNS(NS, 'circle');
    center.setAttribute('cx', cx); center.setAttribute('cy', cy); center.setAttribute('r', innerR);
    center.setAttribute('fill', domColor + '1e');
    center.setAttribute('stroke', domColor); center.setAttribute('stroke-width', '2');
    g.appendChild(center);

    // Name (word-wrapped inside circle)
    const words = iv.label.split(' ');
    const lines = []; let cur = '';
    words.forEach(w => {
      const test = cur ? cur + ' ' + w : w;
      if (test.length > 10 && cur) { lines.push(cur); cur = w; }
      else cur = test;
    });
    if (cur) lines.push(cur);
    const lineH = 13, nameLines = lines.slice(0, 3);
    const nameStartY = cy - (nameLines.length - 1) * lineH / 2;
    nameLines.forEach((line, li) => {
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', cx); t.setAttribute('y', nameStartY + li * lineH);
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('font-size', '11'); t.setAttribute('font-weight', '800');
      t.setAttribute('font-family', 'inherit'); t.setAttribute('fill', domColor);
      t.setAttribute('pointer-events', 'none');
      t.textContent = line;
      g.appendChild(t);
    });

    const ct = document.createElementNS(NS, 'text');
    ct.setAttribute('x', cx); ct.setAttribute('y', nameStartY + nameLines.length * lineH + 1);
    ct.setAttribute('text-anchor', 'middle'); ct.setAttribute('dominant-baseline', 'middle');
    ct.setAttribute('font-size', '9'); ct.setAttribute('font-family', 'inherit');
    ct.setAttribute('fill', domColor); ct.setAttribute('opacity', '0.62');
    ct.setAttribute('pointer-events', 'none');
    ct.textContent = iv.count + ' startups';
    g.appendChild(ct);

    svg.appendChild(g);
  }

  // ── Matrix view ──────────────────────────────────────────────────────────
  let matrixHighlighted = null;

  function renderMatrix() {
    const view  = document.getElementById('view-matrix');
    const svg   = document.getElementById('matrix-svg');
    const stage = document.querySelector('.ca-stage');
    svg.innerHTML = '';
    matrixHighlighted = null;
    view.style.overflow = 'hidden';

    // ── Dimensions: fill the stage exactly ──────────────────────────────
    const PAD    = 14;   // outer margin
    const W      = (stage ? stage.clientWidth  : 900) - PAD * 2;
    const H      = (stage ? stage.clientHeight : 600) - PAD * 2;
    const HEADER = 40;   // header row height
    const labelW = 148;  // investor name column
    const nTheme = THEME_ORDER.length;
    const colW   = Math.floor((W - labelW) / nTheme);
    // How many investors we can fit cleanly
    const maxRows  = Math.max(1, Math.floor((H - HEADER) / 22));
    const minRowH  = 19, maxRowH = 32;
    const topInv   = investors.slice(0, Math.min(maxRows, investors.length));
    const nRows    = Math.max(1, topInv.length);
    const rowH     = Math.max(minRowH, Math.min(maxRowH, Math.floor((H - HEADER) / nRows)));
    const gridW    = labelW + nTheme * colW;
    const gridH    = HEADER + topInv.length * rowH;
    const totalW   = gridW + PAD * 2;
    const totalH   = gridH + PAD * 2;

    svg.setAttribute('width',  totalW);
    svg.setAttribute('height', totalH);
    svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
    svg.style.width  = totalW + 'px';
    svg.style.height = totalH + 'px';
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const g = document.createElementNS(NS, 'g');
    g.setAttribute('transform', `translate(${PAD},${PAD})`);

    // ── Background panel ────────────────────────────────────────────────
    const panelBg = document.createElementNS(NS, 'rect');
    panelBg.setAttribute('x', 0); panelBg.setAttribute('y', 0);
    panelBg.setAttribute('width', gridW); panelBg.setAttribute('height', gridH);
    panelBg.setAttribute('rx', '10');
    panelBg.setAttribute('fill', 'rgba(255,252,246,.72)');
    panelBg.setAttribute('stroke', 'rgba(217,206,190,.42)');
    panelBg.setAttribute('stroke-width', '1');
    g.appendChild(panelBg);

    // ── Column headers (horizontal, colored pill background) ────────────
    // Header bg strip
    const hdrBg = document.createElementNS(NS, 'rect');
    hdrBg.setAttribute('x', labelW); hdrBg.setAttribute('y', 0);
    hdrBg.setAttribute('width', nTheme * colW); hdrBg.setAttribute('height', HEADER);
    hdrBg.setAttribute('rx', '0'); hdrBg.setAttribute('fill', 'rgba(240,234,222,.55)');
    g.appendChild(hdrBg);

    THEME_ORDER.forEach((theme, ci) => {
      const x   = labelW + ci * colW;
      const col = THEME_PAL[theme];
      const lbl = THEME_SHORT[theme] || theme.split(' ')[0];
      // Colored indicator bar at top of each column header
      const bar = document.createElementNS(NS, 'rect');
      bar.setAttribute('x', x + 2); bar.setAttribute('y', 0);
      bar.setAttribute('width', colW - 4); bar.setAttribute('height', 3);
      bar.setAttribute('rx', '1.5');
      bar.setAttribute('fill', col);
      g.appendChild(bar);
      // Vertical divider
      if (ci > 0) {
        const vd = document.createElementNS(NS, 'line');
        vd.setAttribute('x1', x); vd.setAttribute('y1', 0);
        vd.setAttribute('x2', x); vd.setAttribute('y2', HEADER);
        vd.setAttribute('stroke', 'rgba(217,206,190,.3)'); vd.setAttribute('stroke-width', '0.5');
        g.appendChild(vd);
      }
      // Theme label — two-line if needed
      const words = lbl.split(' ');
      const line1 = words[0];
      const line2 = words.slice(1).join(' ');
      const fontSize = colW >= 72 ? 9.5 : 8.5;
      const t1 = document.createElementNS(NS, 'text');
      t1.setAttribute('x', x + colW / 2);
      t1.setAttribute('y', line2 ? HEADER / 2 - 1 : HEADER / 2 + 4);
      t1.setAttribute('text-anchor', 'middle');
      t1.setAttribute('dominant-baseline', line2 ? 'auto' : 'middle');
      t1.setAttribute('font-size', fontSize);
      t1.setAttribute('font-weight', '800');
      t1.setAttribute('font-family', 'inherit');
      t1.setAttribute('fill', col);
      t1.setAttribute('pointer-events', 'none');
      t1.textContent = line1;
      g.appendChild(t1);
      if (line2) {
        const t2 = document.createElementNS(NS, 'text');
        t2.setAttribute('x', x + colW / 2);
        t2.setAttribute('y', HEADER / 2 + 9);
        t2.setAttribute('text-anchor', 'middle');
        t2.setAttribute('font-size', fontSize - 0.5);
        t2.setAttribute('font-weight', '700');
        t2.setAttribute('font-family', 'inherit');
        t2.setAttribute('fill', col);
        t2.setAttribute('opacity', '0.82');
        t2.setAttribute('pointer-events', 'none');
        t2.textContent = line2;
        g.appendChild(t2);
      }
    });

    // Header/body separator
    const hdrLine = document.createElementNS(NS, 'line');
    hdrLine.setAttribute('x1', 0); hdrLine.setAttribute('y1', HEADER);
    hdrLine.setAttribute('x2', gridW); hdrLine.setAttribute('y2', HEADER);
    hdrLine.setAttribute('stroke', 'rgba(217,206,190,.55)'); hdrLine.setAttribute('stroke-width', '1');
    g.appendChild(hdrLine);

    // Label column header
    const lblHead = document.createElementNS(NS, 'text');
    lblHead.setAttribute('x', 10); lblHead.setAttribute('y', HEADER / 2 + 1);
    lblHead.setAttribute('dominant-baseline', 'middle');
    lblHead.setAttribute('font-size', '8.5'); lblHead.setAttribute('font-weight', '800');
    lblHead.setAttribute('font-family', 'inherit');
    lblHead.setAttribute('fill', 'rgba(90,78,62,.55)');
    lblHead.setAttribute('letter-spacing', '0.08em');
    lblHead.setAttribute('pointer-events', 'none');
    lblHead.textContent = `${topInv.length} INVERSORES`;
    g.appendChild(lblHead);

    // ── Per-theme max for relative opacity ──────────────────────────────
    const themeMaxes = {};
    THEME_ORDER.forEach(t => {
      themeMaxes[t] = Math.max(1, ...topInv.map(iv => iv.themes[t] || 0));
    });

    // ── Investor rows ────────────────────────────────────────────────────
    topInv.forEach((iv, ri) => {
      const y  = HEADER + ri * rowH;
      const rg = document.createElementNS(NS, 'g');
      rg.setAttribute('data-inv', iv.id);
      rg.style.cursor = 'pointer';

      // Row background (transparent by default, colored on hover/select)
      const bg = document.createElementNS(NS, 'rect');
      bg.setAttribute('x', 0); bg.setAttribute('y', y);
      bg.setAttribute('width', gridW); bg.setAttribute('height', rowH);
      bg.setAttribute('fill', 'transparent');
      rg.appendChild(bg);

      // Investor name
      const lbl = document.createElementNS(NS, 'text');
      lbl.setAttribute('x', 9); lbl.setAttribute('y', y + rowH / 2);
      lbl.setAttribute('dominant-baseline', 'middle');
      lbl.setAttribute('font-size', rowH >= 26 ? '10' : '9');
      lbl.setAttribute('font-weight', '700');
      lbl.setAttribute('font-family', 'inherit');
      lbl.setAttribute('fill', '#332b22');
      const maxLblChars = Math.floor(labelW / 6.8);
      lbl.textContent = iv.label.length > maxLblChars ? iv.label.slice(0, maxLblChars - 1) + '…' : iv.label;
      rg.appendChild(lbl);

      // Total count badge (right edge of label column)
      const total = THEME_ORDER.reduce((s, t) => s + (iv.themes[t] || 0), 0);
      if (total > 0) {
        const badge = document.createElementNS(NS, 'text');
        badge.setAttribute('x', labelW - 5); badge.setAttribute('y', y + rowH / 2);
        badge.setAttribute('text-anchor', 'end'); badge.setAttribute('dominant-baseline', 'middle');
        badge.setAttribute('font-size', '7.5'); badge.setAttribute('font-weight', '800');
        badge.setAttribute('font-family', 'inherit');
        badge.setAttribute('fill', 'rgba(90,78,62,.42)');
        badge.setAttribute('pointer-events', 'none');
        badge.textContent = total;
        rg.appendChild(badge);
      }

      // Label column right border
      const lblBorder = document.createElementNS(NS, 'line');
      lblBorder.setAttribute('x1', labelW); lblBorder.setAttribute('y1', y);
      lblBorder.setAttribute('x2', labelW); lblBorder.setAttribute('y2', y + rowH);
      lblBorder.setAttribute('stroke', 'rgba(217,206,190,.28)'); lblBorder.setAttribute('stroke-width', '0.5');
      rg.appendChild(lblBorder);

      // Theme cells
      THEME_ORDER.forEach((theme, ci) => {
        const count = iv.themes[theme] || 0;
        const cx    = labelW + ci * colW;
        const color = THEME_PAL[theme];

        const cell = document.createElementNS(NS, 'rect');
        cell.setAttribute('x', cx + 2); cell.setAttribute('y', y + 2);
        cell.setAttribute('width', colW - 4); cell.setAttribute('height', rowH - 4);
        cell.setAttribute('rx', '4');
        if (count === 0) {
          cell.setAttribute('fill', 'rgba(210,200,185,.09)');
        } else {
          const ratio = count / themeMaxes[theme];
          const op = 0.13 + ratio * 0.74;
          cell.setAttribute('fill', color);
          cell.setAttribute('opacity', String(op));
        }
        rg.appendChild(cell);

        if (count > 0 && colW >= 28) {
          const ratio   = count / themeMaxes[theme];
          const darkBg  = ratio > 0.52;
          const ct = document.createElementNS(NS, 'text');
          ct.setAttribute('x', cx + colW / 2); ct.setAttribute('y', y + rowH / 2);
          ct.setAttribute('text-anchor', 'middle'); ct.setAttribute('dominant-baseline', 'middle');
          ct.setAttribute('font-size', rowH >= 26 ? '8.5' : '7.5');
          ct.setAttribute('font-weight', '800');
          ct.setAttribute('font-family', 'inherit');
          ct.setAttribute('fill', darkBg ? '#fff' : color);
          ct.setAttribute('pointer-events', 'none');
          ct.textContent = count;
          rg.appendChild(ct);
        }
      });

      rg.addEventListener('click', () =>
        setActiveInvestor(activeInvId === iv.id ? null : iv.id));

      rg.addEventListener('mouseenter', () => {
        if (matrixHighlighted !== iv.id) {
          bg.setAttribute('fill', 'rgba(58,168,163,.07)');
          lbl.setAttribute('fill', '#0a6b63');
        }
      });
      rg.addEventListener('mouseleave', () => {
        if (matrixHighlighted !== iv.id) {
          bg.setAttribute('fill', 'transparent');
          lbl.setAttribute('fill', '#332b22');
        }
      });

      g.appendChild(rg);
    });

    // ── Row dividers ────────────────────────────────────────────────────
    for (let ri = 1; ri < topInv.length; ri++) {
      const y = HEADER + ri * rowH;
      const d = document.createElementNS(NS, 'line');
      d.setAttribute('x1', 0); d.setAttribute('y1', y);
      d.setAttribute('x2', gridW); d.setAttribute('y2', y);
      d.setAttribute('stroke', 'rgba(217,206,190,.18)'); d.setAttribute('stroke-width', '0.5');
      g.insertBefore(d, g.firstChild);
    }

    // ── Column vertical dividers through rows ───────────────────────────
    THEME_ORDER.forEach((_, ci) => {
      if (ci === 0) return;
      const x = labelW + ci * colW;
      const vd = document.createElementNS(NS, 'line');
      vd.setAttribute('x1', x); vd.setAttribute('y1', HEADER);
      vd.setAttribute('x2', x); vd.setAttribute('y2', gridH);
      vd.setAttribute('stroke', 'rgba(217,206,190,.18)'); vd.setAttribute('stroke-width', '0.5');
      g.insertBefore(vd, g.firstChild);
    });

    svg.appendChild(g);
  }

  function highlightMatrixRow(id) {
    matrixHighlighted = id;
    const svg = document.getElementById('matrix-svg');
    svg.querySelectorAll('[data-inv]').forEach(rg => {
      const isA = rg.dataset.inv === id;
      const bg  = rg.querySelector('rect');
      const lbl = rg.querySelector('text');
      if (bg)  bg.setAttribute('fill',  isA ? 'rgba(58,168,163,.10)' : 'transparent');
      if (lbl) lbl.setAttribute('fill', isA ? '#0a6b63' : '#332b22');
    });
  }

}); // DOMContentLoaded
</script>

</body>
</html>
